nction (HR, BP lability)\nRespiratory failure (25%)\nFacial weakness (bilateral)\nDifficulty swallowing","treatment":"1. IVIG or plasmapheresis (equally effective)\n2. Monitor respiratory function closely (FVC q4-6h)\n3. Intubate if FVC <20mL/kg or NIF <-30 cmH2O (20/30/40 rule)\n4. DVT prophylaxis\n5. Pain management\n6. ICU monitoring for autonomic instability\n7. Steroids NOT effective","meds":"IVIG 0.4g/kg/day x5 days\nOR Plasmapheresis 5 exchanges over 2 weeks\nEnoxaparin 40mg SC daily (DVT prophylaxis)\nGabapentin 300-600mg TID (neuropathic pain)\nNifedipine or labetalol (autonomic BP swings)","ddx":"Transverse myelitis, Myasthenia gravis, Botulism, Tick paralysis, Chronic inflammatory demyelinating polyneuropathy (CIDP), Spinal cord compression, Poliomyelitis","labs":"LP: albuminocytologic dissociation (high protein, normal WBC) - may be normal first week\nNerve conduction studies/EMG (demyelination pattern)\nFVC and NIF serial measurements\nAnti-ganglioside antibodies (GQ1b in Miller Fisher)\nMRI spine (r/o cord compression, nerve root enhancement)\nCBC, BMP","notes":"Typically 1-4 weeks after respiratory/GI illness (Campylobacter jejuni most common)\n20/30/40 rule for intubation: FVC <20mL/kg, NIF <-30, >40% decline from baseline\nMiller Fisher variant: ataxia, areflexia, ophthalmoplegia\nNadir typically 2-4 weeks; recovery over weeks-months\n80% recover fully; 5% mortality\nDo NOT give steroids - no benefit and may worsen","created":1772760251083,"builtIn":true},{"id":"dx48","name":"Myasthenia Gravis","icd":"G70.00","catId":"c3","color":"#a855f7","signs":"Fluctuating weakness worse with activity\nPtosis (often first symptom)\nDiplopia\nDysphagia\nDysarthria\nFacial weakness\nProximal limb weakness\nRespiratory weakness (myasthenic crisis)\nImproves with rest","treatment":"1. Acetylcholinesterase inhibitor (pyridostigmine)\n2. Immunosuppression for generalized disease\n3. Myasthenic crisis: IVIG or plasmapheresis + ICU\n4. Thymectomy (if thymoma or generalized anti-AChR+)\n5. Avoid myasthenia-worsening drugs\n6. Monitor respiratory function","meds":"Pyridostigmine 60mg PO TID (titrate up)\nPrednisone 1mg/kg/day (slow taper)\nAzathioprine 2-3mg/kg/day\nMycophenolate 1-1.5g BID\nIVIG 2g/kg over 5 days (crisis)\nPlasmapheresis 5 exchanges (crisis)\nRituximab (refractory)","ddx":"Lambert-Eaton syndrome, Botulism, GBS, ALS, Brainstem stroke, MS, Thyroid ophthalmopathy","labs":"Anti-AChR antibodies (85% sensitivity)\nAnti-MuSK antibodies (if AChR negative)\nCT chest (thymoma)\nEdrophonium (Tensilon) test (rarely used now)\nIce pack test (ptosis improves)\nRepetitive nerve stimulation (decremental response)\nSingle-fiber EMG (most sensitive)\nPFTs, NIF (respiratory monitoring)","notes":"Drugs that worsen MG: aminoglycosides, fluoroquinolones, beta-blockers, magnesium, phenytoin, lithium, D-penicillamine, immune checkpoint inhibitors\nMyasthenic crisis: respiratory failure requiring intubation\nCholinergic crisis: overdose of anticholinesterase (SLUDGE symptoms)\nDistinguish with edrophonium or clinical context\nThymoma present in 10-15%; thymectomy even without thymoma if generalized anti-AChR+","created":1772760250083,"builtIn":true},{"id":"dx49","name":"Inflammatory Bowel Disease - Crohn","icd":"K50.90","catId":"c4","color":"#f97316","signs":"Abdominal pain (often RLQ)\nDiarrhea (may be bloody or non-bloody)\nWeight loss\nFever\nFatigue\nPerianal disease (fistulas, abscesses, tags)\nOral aphthous ulcers\nSkip lesions\nBowel obstruction symptoms","treatment":"1. Induction: corticosteroids or biologics\n2. Mild: budesonide or mesalamine\n3. Moderate-severe: biologics (anti-TNF, anti-integrin, anti-IL12/23)\n4. Immunomodulators for maintenance\n5. Surgery for complications (stricture, fistula, abscess)\n6. Nutritional support\n7. Smoking cessation (worsens Crohn)","meds":"Budesonide 9mg PO daily (ileal/right colon)\nPrednisone 40-60mg daily taper (flare)\nInfliximab 5mg/kg IV at 0, 2, 6wk then q8wk\nAdalimumab 160mg then 80mg then 40mg SC q2wk\nVedolizumab 300mg IV\nUstekinumab 6mg/kg IV then 90mg SC q8wk\nAzathioprine 2-2.5mg/kg daily\nMetronidazole 500mg TID (perianal)","ddx":"Ulcerative colitis, Infectious colitis, IBS, Celiac disease, Appendicitis, Intestinal TB, Lymphoma, Diverticulitis","labs":"CBC (anemia, leukocytosis)\nCRP, ESR (inflammation markers)\nAlbumin (nutritional status)\nFecal calprotectin\nStool studies (r/o C. diff, infections)\nColonoscopy with biopsies (cobblestoning, skip lesions, noncaseating granulomas)\nCT/MR enterography (strictures, fistulas, abscesses)\nSmall bowel series or capsule endoscopy","notes":"Crohn vs UC: Crohn = mouth to anus, transmural, skip lesions, granulomas, fistulas\nUC = colon only, continuous, mucosal, no granulomas\nExtraintestinal: arthritis, erythema nodosum, pyoderma gangrenosum, uveitis, sclerosing cholangitis (more UC), sacroiliitis\nStricturing vs penetrating vs inflammatory phenotype\nNever give anti-TNF without ruling out TB and Hep B first","created":1772760249083,"builtIn":true},{"id":"dx50","name":"GI Bleed - Lower","icd":"K92.1","catId":"c4","color":"#f97316","signs":"Hematochezia (bright red blood per rectum)\nMaroon stools\nAbdominal pain/cramping (variable)\nHemodynamic instability if severe\nDizziness/syncope\nPallor\nRectal mass on exam (possible)","treatment":"1. Resuscitation: IV fluids, blood transfusion if needed\n2. Identify source: colonoscopy (after prep, within 24h)\n3. CT angiography if brisk bleeding\n4. Tagged RBC scan for intermittent/slow bleeding\n5. Angiographic embolization if ongoing and source identified\n6. Surgical consultation for massive uncontrolled bleeding\n7. Reverse anticoagulation if applicable","meds":"NS/LR resuscitation\nPRBCs: transfuse if Hgb <7 (or <9 with CAD)\nReverse anticoagulation as appropriate\nGoLytely 1L/h x4h (colonoscopy prep)\nAminocaproic acid (rare, selected cases)","ddx":"Diverticular bleed (most common), Angiodysplasia, Hemorrhoids, Colorectal cancer, IBD, Ischemic colitis, Radiation proctitis, Meckel diverticulum (young), Upper GI bleed (brisk)","labs":"CBC (may be normal initially)\nBMP\nCoags, type and crossmatch\nLactate\nColonoscopy (after prep)\nCT angiography (active extravasation)\nTagged RBC scan\nConsider upper endoscopy to rule out brisk upper source","notes":"Diverticular bleeding: painless, self-limited in 80%\nAngiodysplasia: elderly, often right colon, associated with aortic stenosis\nAlways consider upper GI source - 10-15% of hematochezia is from upper GI bleed\nMassive transfusion protocol: 1:1:1 ratio PRBCs:FFP:Platelets\nPost-polypectomy bleeding: can occur up to 2 weeks after","created":1772760248083,"builtIn":true},{"id":"dx51","name":"Myxedema Coma","icd":"E03.5","catId":"c6","color":"#eab308","signs":"Hypothermia\nAltered mental status/coma\nBradycardia\nHypotension\nHyponatremia\nHypoglycemia\nHypoventilation/respiratory failure\nNon-pitting edema (myxedema)\nDelayed relaxation of reflexes\nSeizures","treatment":"1. IV levothyroxine loading dose\n2. IV hydrocortisone (before or with T4 - rule out concurrent adrenal insufficiency)\n3. Passive rewarming (avoid active - can cause vasodilation/shock)\n4. Mechanical ventilation if needed\n5. IV fluids with dextrose cautiously\n6. Treat precipitating cause\n7. ICU admission","meds":"Levothyroxine 200-400mcg IV loading then 50-100mcg IV daily\nLiothyronine (T3) 5-20mcg IV q8h (controversial, some centers add)\nHydrocortisone 100mg IV q8h (until adrenal insufficiency excluded)\nD50 for hypoglycemia\nNS for hyponatremia (fluid restrict if severe)","ddx":"Sepsis, Stroke, Drug overdose (sedatives, opioids), Hypothermia (primary), Hypoglycemia, Adrenal crisis","labs":"TSH (markedly elevated in primary)\nFree T4 (very low)\nFree T3\nCortisol (rule out adrenal insufficiency)\nBMP (hyponatremia, hypoglycemia)\nCBC\nABG/VBG (hypercapnia, hypoxia)\nCK (elevated from myopathy)\nLipase, LFTs","notes":"Mortality 30-60% even with treatment\nPrecipitants: infection, cold exposure, medications (sedatives, amiodarone, lithium), noncompliance, surgery\nGive hydrocortisone empirically - cannot distinguish primary from secondary hypothyroidism acutely\nDo NOT actively warm (causes peripheral vasodilation and shock)\nHyponatremia from SIADH and impaired free water excretion","created":1772760247083,"builtIn":true},{"id":"dx52","name":"Gout","icd":"M10.9","catId":"c11","color":"#a855f7","signs":"Acute monoarticular arthritis (1st MTP classic - podagra)\nSevere pain, swelling, erythema, warmth\nFever\nTophi (chronic)\nJoint stiffness\nDesquamation over joint after attack\nPolyarticular in advanced disease","treatment":"1. Acute flare: NSAIDs, colchicine, or corticosteroids\n2. Start within 24h of flare onset\n3. Do NOT start or stop allopurinol during acute flare\n4. Urate-lowering therapy if: >=2 flares/year, tophi, urate nephropathy, renal stones\n5. Treat to target: serum urate <6mg/dL\n6. Lifestyle: limit alcohol/purines, weight loss, hydration","meds":"Acute: Indomethacin 50mg TID x5-7d or Naproxen 500mg BID\nColchicine 1.2mg then 0.6mg 1h later (within 36h of onset)\nPrednisone 30-40mg daily x5d (if NSAIDs contraindicated)\nIntra-articular triamcinolone 10-40mg\nProphylaxis: Allopurinol 100mg daily (titrate to urate <6)\nFebuxostat 40-80mg daily\nColchicine 0.6mg daily during ULT initiation","ddx":"Septic arthritis, Pseudogout (CPPD), Cellulitis, Rheumatoid arthritis, Reactive arthritis, Trauma","labs":"Joint aspiration (gold standard): negatively birefringent needle-shaped MSU crystals\nCell count (10,000-70,000 WBC, neutrophil predominant)\nGram stain/culture (rule out septic arthritis)\nSerum uric acid (may be normal during acute flare)\nBMP (renal function)\nCBC, ESR/CRP\nJoint X-ray (chronic: punched-out erosions, overhanging edges)\nDual-energy CT (advanced)","notes":"Serum urate often NORMAL during acute flare - do not use to rule out gout\nJoint aspiration is gold standard but clinical diagnosis acceptable\nAllopurinol: start low (100mg), go slow, titrate q2-4wks to target urate <6\nAllopurinol flare prophylaxis: colchicine 0.6mg daily for 3-6 months\nHLA-B*5801 testing in Southeast Asian, African American patients before allopurinol (SJS risk)","created":1772760246083,"builtIn":true},{"id":"dx53","name":"Septic Arthritis","icd":"M00.9","catId":"c11","color":"#a855f7","signs":"Acute monoarticular arthritis (knee most common)\nSevere pain with any movement\nJoint effusion\nWarmth and erythema\nFever\nRefusal to bear weight or move joint\nSystemic illness","treatment":"1. Joint aspiration BEFORE antibiotics (but do not delay if septic)\n2. Empiric IV antibiotics\n3. Surgical drainage/washout (especially hip, prosthetic joints)\n4. Serial aspirations or arthroscopic washout\n5. Orthopedic/surgical consultation\n6. Duration: typically 2-4 weeks IV (varies)","meds":"Vancomycin 15-20mg/kg IV q8-12h (empiric, covers MRSA)\nCeftriaxone 2g IV daily (add for gram-negative coverage)\nNafcillin 2g IV q4h (if MSSA confirmed)\nCeftazidime 2g IV q8h (if Pseudomonas suspected - IVDU)\nGonococcal: Ceftriaxone 1g IV/IM daily","ddx":"Gout, Pseudogout, Reactive arthritis, Rheumatoid arthritis flare, Lyme arthritis, Trauma with hemarthrosis, Osteomyelitis","labs":"Joint aspiration (MANDATORY): cell count >50,000 WBC (usually >100k), >75% PMNs\nGram stain (positive in 50-75%)\nSynovial fluid culture\nBlood cultures x2\nCBC, ESR, CRP\nBMP\nGonococcal NAAT (urethral, cervical, pharyngeal, rectal)\nJoint X-ray (baseline)\nMRI (if concern for adjacent osteomyelitis)","notes":"Most common: S. aureus (adults), N. gonorrhoeae (young sexually active adults)\nGonococcal: often migratory polyarthralgia, tenosynovitis, dermatitis before settling in one joint\nProsthetic joint infection: lower WBC threshold (>1,100)\nSynovial WBC >50,000 with >75% PMNs = septic until proven otherwise\nDo NOT delay antibiotics for aspiration if sepsis present\nLyme arthritis: large joint (knee), may have lower WBC counts","created":1772760245083,"builtIn":true},{"id":"dx54","name":"Neuroleptic Malignant Syndrome","icd":"G21.0","catId":"c3","color":"#a855f7","signs":"High fever (>104F)\nMuscle rigidity (lead-pipe)\nAltered mental status\nAutonomic instability (tachycardia, labile BP, diaphoresis)\nElevated CK\nLeukocytosis\nMetabolic acidosis\nTremor","treatment":"1. Stop offending agent immediately\n2. Aggressive cooling\n3. IV fluids\n4. Dantrolene for severe rigidity\n5. Bromocriptine or amantadine\n6. Benzodiazepines for agitation\n7. ICU admission\n8. Monitor for rhabdomyolysis, renal failure, DIC","meds":"Dantrolene 1-2.5mg/kg IV q6h (max 10mg/kg/day)\nBromocriptine 2.5mg PO/NGT q8h\nLorazepam 1-2mg IV q6h (agitation/rigidity)\nIV NS aggressive hydration\nSodium bicarbonate if rhabdomyolysis","ddx":"Serotonin syndrome, Malignant hyperthermia, Lethal catatonia, Meningitis/encephalitis, Thyroid storm, Anticholinergic toxicity, Heat stroke","labs":"CK (markedly elevated, often >1000)\nBMP (AKI from rhabdomyolysis)\nCBC (leukocytosis)\nLFTs\nCoags (DIC)\nUrinalysis (myoglobinuria)\nLactate\nABG/VBG\nIron (low)\nBlood cultures (r/o infection)","notes":"Caused by dopamine antagonists: haloperidol, droperidol, metoclopramide, all antipsychotics\nOnset: days to weeks after starting or dose increase\nNMS vs Serotonin syndrome: NMS = rigidity, slow onset, bradyreflexia; SS = clonus, rapid onset, hyperreflexia\nNMS vs Malignant hyperthermia: MH = succinylcholine/inhalational anesthetics, masseter rigidity\nMortality 5-20% with treatment\nReintroduce antipsychotic cautiously (different class) after 2+ weeks","created":1772760244083,"builtIn":true},{"id":"dx55","name":"Serotonin Syndrome","icd":"G25.79","catId":"c3","color":"#a855f7","signs":"Clonus (spontaneous, inducible, ocular)\nAgitation/restlessness\nDiaphoresis\nHyperthermia\nTachycardia\nHyperreflexia\nTremor\nMuscle rigidity (late)\nDiarrhea\nDilated pupils","treatment":"1. Stop all serotonergic agents\n2. Benzodiazepines for agitation\n3. Cyproheptadine (serotonin antagonist)\n4. Active cooling if hyperthermic\n5. IV fluids\n6. Avoid paralytics unless intubation needed\n7. ICU for severe cases\n8. Usually resolves within 24-72h","meds":"Cyproheptadine 12mg PO/NGT then 4mg q2h PRN (max 32mg/day)\nLorazepam 1-2mg IV q15-30min PRN\nIV NS hydration\nAvoid dantrolene (not effective in SS)\nExternal cooling measures","ddx":"NMS, Anticholinergic toxicity, Malignant hyperthermia, Sympathomimetic overdose, Meningitis, Thyroid storm","labs":"Clinical diagnosis (Hunter criteria)\nCK (may be elevated)\nBMP\nCBC\nLFTs\nCoags\nUrinalysis\nLactate\nTox screen","notes":"Hunter criteria: serotonergic agent + ANY of: spontaneous clonus, inducible clonus + agitation/diaphoresis, ocular clonus + agitation/diaphoresis, tremor + hyperreflexia, temp >38 + ocular/inducible clonus\nCommon drugs: SSRIs, SNRIs, MAOIs, tramadol, triptans, linezolid, methylene blue, dextromethorphan, MDMA\nMAOI + SSRI = most dangerous combination\nKey differentiator from NMS: clonus and hyperreflexia (NMS has rigidity and hyporeflexia)","created":1772760243083,"builtIn":true},{"id":"dx56","name":"Stevens-Johnson Syndrome / TEN","icd":"L51.1","catId":"c9","color":"#f43f5e","signs":"Prodrome: fever, malaise, URI symptoms 1-3 days before rash\nTarget-like lesions evolving to bullae\nFlaccid blisters, Nikolsky sign positive\nMucosal involvement (oral, ocular, genital)\nSkin pain/tenderness\nEpidermal detachment\nSJS: <10% BSA; TEN: >30% BSA","treatment":"1. Stop offending drug immediately\n2. Transfer to burn center/ICU\n3. Supportive care (wound care, fluid replacement, pain management)\n4. Ophthalmology consult (corneal damage)\n5. Cyclosporine may reduce progression (evidence emerging)\n6. Avoid systemic corticosteroids (controversial)\n7. SCORTEN for prognosis","meds":"Aggressive IV fluid resuscitation\nPain management: morphine, acetaminophen\nCyclosporine 3-5mg/kg/day (controversial but growing evidence)\nSilver-based wound dressings\nOphthalmologic drops/lubricants\nAvoid sulfonamides, corticosteroids debated","ddx":"Erythema multiforme, DRESS syndrome, Staphylococcal scalded skin syndrome, Pemphigus vulgaris, Autoimmune bullous diseases, Acute GVHD","labs":"Clinical diagnosis\nSkin biopsy (full-thickness epidermal necrosis)\nCBC, BMP, LFTs\nBlood cultures (secondary infection)\nPhoto documentation\nSCORTEN score at day 1 and day 3","notes":"Most common culprits: allopurinol, sulfonamides, carbamazepine, phenytoin, lamotrigine, NSAIDs (oxicam), antibiotics (fluoroquinolones, cephalosporins)\nSCORTEN: age >40, malignancy, BSA >10%, tachycardia, BUN >28, glucose >252, bicarb <20\nHLA-B*5801: allopurinol SJS risk (Southeast Asian, African American)\nHLA-B*1502: carbamazepine SJS risk (Southeast Asian)\nOcular complications in 50-90%: symblepharon, corneal scarring, dry eye","created":1772760242083,"builtIn":true},{"id":"dx57","name":"Pre-eclampsia / Eclampsia","icd":"O14.90","catId":"c12","color":"#ec4899","signs":"HTN (>=140/90 after 20wk gestation)\nProteinuria\nHeadache\nVisual changes (scotomata)\nRUQ/epigastric pain\nEdema (facial)\nHyperreflexia/clonus\nSeizures (eclampsia)\nPulmonary edema\nHELLP: hemolysis, elevated LFTs, low platelets","treatment":"1. Delivery is definitive treatment\n2. Magnesium sulfate for seizure prophylaxis\n3. Antihypertensives for severe HTN (>=160/110)\n4. >=37wk: deliver\n5. <37wk with severe features: deliver after stabilization\n6. <37wk without severe features: expectant management with close monitoring\n7. Betamethasone if <34wk (fetal lung maturity)","meds":"Magnesium sulfate 4-6g IV bolus then 1-2g/h infusion\nLabetalol 20mg IV then 40mg then 80mg q10min\nHydralazine 5-10mg IV q20min\nNifedipine 10-20mg PO q20-30min\nBetamethasone 12mg IM x2 doses 24h apart (if <34wk)\nCalcium gluconate 1g IV (magnesium antidote)","ddx":"Gestational HTN, Chronic HTN, HELLP syndrome, TTP/HUS, Acute fatty liver of pregnancy, SLE flare, Pheochromocytoma","labs":"BP monitoring\n24h urine protein or protein/creatinine ratio\nCBC (platelets, hemolysis)\nBMP (creatinine, uric acid)\nLFTs (AST/ALT)\nLDH\nPeripheral smear (schistocytes)\nCoags\nFetal monitoring (NST, BPP, umbilical artery Doppler)","notes":"Severe features: SBP >=160, DBP >=110, platelets <100k, Cr >1.1, LFTs >2x normal, pulmonary edema, cerebral/visual symptoms\nEclampsia: seizures in pre-eclampsia setting - give MgSO4 first, then deliver\nMgSO4 monitoring: reflexes (lose at 10), respiratory rate (lose at 15), cardiac arrest (>25)\nHELLP: can occur without significant HTN or proteinuria\nPostpartum pre-eclampsia: up to 6 weeks after delivery","created":1772760241083,"builtIn":true},{"id":"dx58","name":"Clostridioides difficile Infection","icd":"A04.72","catId":"c5","color":"#22c55e","signs":"Watery diarrhea (10-15 stools/day)\nLower abdominal pain/cramping\nFever\nNausea\nAnorexia\nLeukocytosis (often very high, WBC >15k)\nDehydration\nAbdominal distension\nToxic megacolon (severe)","treatment":"1. Stop inciting antibiotic if possible\n2. Non-severe initial: fidaxomicin (preferred) or vancomycin PO\n3. Severe (WBC >15k or Cr >1.5): vancomycin PO\n4. Fulminant: vancomycin PO + PR + IV metronidazole\n5. Surgical consultation for toxic megacolon\n6. Fecal microbiota transplant for recurrent episodes\n7. Contact precautions, hand washing with soap and water (not alcohol gel)","meds":"Fidaxomicin 200mg PO BID x10d (preferred, less recurrence)\nVancomycin 125mg PO QID x10d\nMetronidazole 500mg IV q8h (add for fulminant)\nVancomycin retention enema 500mg in 100mL NS q6h (fulminant with ileus)\nBezlotoxumab 10mg/kg IV x1 (anti-toxin B, prevents recurrence in high-risk)","ddx":"Infectious diarrhea (Salmonella, Shigella, Campylobacter), IBD flare, Ischemic colitis, Antibiotic-associated diarrhea (non-C diff), CMV colitis","labs":"C. diff PCR (NAAT) or GDH/EIA (2-step testing)\nCBC (leukocytosis, sometimes leukemoid >40k)\nBMP (AKI from dehydration)\nLactate\nAlbumin\nCT abdomen if severe (colon wall thickening, megacolon)\nAbdominal X-ray (toxic megacolon: >6cm)","notes":"Risk factors: antibiotics (fluoroquinolones, clindamycin, cephalosporins), PPI, hospitalization, age >65\nSeverity: non-severe (WBC <15k and Cr <1.5), severe (WBC >=15k or Cr >=1.5), fulminant (hypotension, shock, ileus, megacolon)\nDo NOT test for cure - PCR stays positive\nDo NOT use anti-motility agents (loperamide)\nRecurrence rate 20-25% after first episode\nSpores survive alcohol-based sanitizer - use soap and water","created":1772760240083,"builtIn":true},{"id":"dx59","name":"Meningitis - Viral","icd":"A87.9","catId":"c5","color":"#22c55e","signs":"Headache\nFever\nPhotophobia\nNeck stiffness (often milder than bacterial)\nNausea/vomiting\nMalaise\nMyalgias\nRash (enterovirus)\nGenerally less toxic-appearing than bacterial","treatment":"1. Supportive care (most cases self-limited)\n2. Empiric bacterial coverage until CSF results if any doubt\n3. Analgesics/antipyretics\n4. IV acyclovir if HSV suspected (encephalitis risk)\n5. Hydration\n6. Most recover in 7-10 days","meds":"Acetaminophen 1g PO q6h\nIbuprofen 600mg PO q8h\nAcyclovir 10mg/kg IV q8h (if HSV suspected)\nIV fluids for hydration\nOndansetron 4mg IV PRN nausea","ddx":"Bacterial meningitis, HSV encephalitis, Lyme meningitis, TB meningitis, Fungal meningitis, SAH, Migraine","labs":"LP: lymphocytic pleocytosis (WBC 50-1000), normal glucose, normal-mildly elevated protein\nCSF HSV PCR\nCSF enterovirus PCR\nCSF Gram stain/culture (to rule out bacterial)\nCBC, BMP\nBlood cultures\nHIV test\nLyme serologies if endemic area","notes":"Most common: enteroviruses (summer/fall)\nHSV-2: can cause recurrent (Mollaret) meningitis\nEarly bacterial meningitis can mimic viral - when in doubt, treat empirically\nCSF findings: bacterial has WBC >1000 (PMNs), low glucose, high protein\nParechovirus: common cause in infants\nMost viral meningitis resolves without sequelae","created":1772760239083,"builtIn":true},{"id":"dx60","name":"Acute Liver Failure","icd":"K72.00","catId":"c4","color":"#f97316","signs":"Jaundice\nCoagulopathy (INR >1.5)\nHepatic encephalopathy\nRUQ tenderness\nAscites\nHypoglycemia\nCerebral edema\nMulti-organ failure","treatment":"1. ICU admission\n2. N-acetylcysteine (even non-APAP causes)\n3. Correct coagulopathy only if active bleeding\n4. Lactulose for encephalopathy\n5. ICP monitoring/management\n6. Treat underlying cause\n7. Liver transplant evaluation emergently\n8. Infection surveillance","meds":"NAC IV protocol (same as APAP overdose)\nLactulose 30mL q2h titrate to 2-3 BM/day\nMannitol 0.5-1g/kg IV (cerebral edema)\nHypertonic saline 23.4% for ICP crisis\nFFP/cryoprecipitate only if actively bleeding\nD10 infusion for hypoglycemia","ddx":"APAP toxicity, Viral hepatitis (A, B), Drug reaction (DILI), Wilson disease, Autoimmune hepatitis, Budd-Chiari, HELLP/AFLP, Mushroom poisoning, Ischemic hepatitis","labs":"LFTs (AST/ALT often >1000)\nPT/INR (key prognostic marker)\nBMP, CBC\nAmmonia\nAPAP level\nViral hepatitis panel (HAV IgM, HBsAg, HBc IgM, HCV RNA)\nCeruloplasmin, 24h urine copper (Wilson)\nAutoimmune markers (ANA, ASMA, IgG)\nLactate\nArterial ammonia\nFactor V level (prognostic)","notes":"Definition: acute liver injury + coagulopathy (INR >1.5) + encephalopathy in patient WITHOUT pre-existing liver disease\nHyperacute (<7d): better prognosis (APAP, ischemic)\nAcute (7-21d): viral hepatitis\nSubacute (21d-26wk): drug reactions, Wilson\nKings College Criteria for transplant listing\nAPAP: pH <7.3, or INR >6.5 + Cr >3.4 + Grade 3-4 encephalopathy","created":1772760238083,"builtIn":true},{"id":"dx61","name":"Diabetic Foot Ulcer / Osteomyelitis","icd":"E11.621","catId":"c5","color":"#22c55e","signs":"Non-healing foot ulcer\nWound drainage/purulence\nPeriwound erythema\nSwelling\nFever (if systemic)\nProbe-to-bone positive\nDecreased sensation (neuropathy)\nPedal pulses diminished (PAD)","treatment":"1. Wound assessment and classification (Wagner, UT classification)\n2. Offloading (total zobactam 4.5g IV q6h OR Cefepime 2g IV q8h OR Meropenem 1g IV q8h\nAnti-MRSA: Vancomycin 15-20mg/kg IV q8-12h OR Linezolid 600mg IV q12h\nAdjust per cultures and sensitivities\nNebulized antibiotics for MDR gram-negatives (adjunct)","ddx":"Atelectasis, PE, ARDS, CHF, Aspiration pneumonitis, Drug fever","labs":"CXR or CT chest\nSputum culture/Gram stain (before antibiotics)\nBlood cultures x2\nCBC with differential\nBMP\nProCalcitonin (guide duration)\nABG if hypoxemic\nConsider bronchoscopy with BAL for ICU patients","notes":"HAP: >=48h after admission, not intubated\nVAP: >=48h after intubation\nRisk factors for MDR: prior IV abx in 90d, >=5d hospitalization before onset, septic shock, ARDS, prior MRSA/Pseudomonas\nDouble cover Pseudomonas only if risk factors for MDR AND septic shock\nVAP bundle: HOB elevation, daily sedation vacation, DVT/PUD prophylaxis, daily readiness to extubate assessment","created":1772760236083,"builtIn":true},{"id":"dx63","name":"Acute Limb Ischemia","icd":"I74.3","catId":"c13","color":"#f43f5e","signs":"6 Ps: Pain, Pallor, Pulselessness, Paresthesias, Paralysis, Poikilothermia (cold)\nSudden onset leg pain\nAbsence of distal pulses\nCool pale limb\nMottling\nMuscle tenderness\nSensory loss\nMotor weakness (late, ominous)","treatment":"1. Immediate anticoagulation with heparin\n2. Vascular surgery consultation STAT\n3. Rutherford classification guides treatment\n4. Viable (I): anticoagulate, arteriography\n5. Threatened (II): revascularization (embolectomy, bypass, endovascular)\n6. Irreversible (III): amputation\n7. Monitor for reperfusion syndrome/compartment syndrome","meds":"Heparin 80u/kg IV bolus then 18u/kg/h\nThrombolytics (catheter-directed tPA) for selected cases\nAnalgesia: morphine/fentanyl IV\nNS hydration (prevent rhabdomyolysis post-reperfusion)\nSodium bicarbonate (if reperfusion injury)","ddx":"Chronic limb-threatening ischemia, DVT (phlegmasia), Compartment syndrome, Aortic dissection with limb malperfusion, Cholesterol entional angiography (gold standard)\nCBC, BMP, coags\nTroponin (neurogenic stunned myocardium)\nECG (diffuse T-wave inversions, QT prolongation)","notes":"CT sensitivity: ~98% at 6h, ~93% at 12h, ~50% at 5 days\nHunt-Hess grade: I (mild HA) to V (coma) - prognostic\nFisher grade: based on CT blood pattern - predicts vasospasm risk\nVasospasm: days 4-14 post-SAH, monitor with transcranial Doppler\nTriple H therapy (hypertension, hypervolemia, hemodilution) being replaced by induced hypertension alone\nRebleeding risk highest in first 24h","created":1772760234083,"builtIn":true},{"id":"dx65","name":"Tension Pneumothorax","icd":"J93.0","catId":"c9","color":"#f43f5e","signs":"Severe respiratory distress\nHypotension/shock\nTracheal deviation (away from affected side)\nAbsent breath sounds (affected side)\nDistended neck veins\nTachycardia\nCyanosis\nSubcutaneous emphysema\nCardiac arrest (PEA)","treatment":"1. CLINICAL DIAGNOSIS - do NOT delay for imaging\n2. Immediate needle decompression: 14-16g needle, 2nd ICS MCL (or 4th/5th ICS AAL)\n3. Follow immediately with chest tube: 5th ICS anterior axillary line\n4. High-flow oxygen\n5. Fluid resuscitation if hypotensive","meds":"Supplemental oxygen 100% NRB\nIV fluid bolus\nPain management after decompression\nChest tube: 28-32Fr","ddx":"Massive PE, Cardiac tamponade, Hemothorax, Simple pneumothorax, MI, Anaphylaxis","labs":"This is a CLINICAL DIAGNOSIS\nPost-decompression CXR\nABG\nPoint-of-care US (absent lung sliding, lung point)","notes":"Tension PTX = air enters pleural space but cannot escape (one-way valve)\nCauses: trauma, mechanical ventilation, central line placement, lung biopsy, CPR\nNeedle decompression is temporizing - MUST place chest tube after\n5th ICS AAL may be more reliable than 2nd ICS MCL for decompression (less adipose tissue)\nIn cardiac arrest: bilateral finger thoracostomies","created":1772760233083,"builtIn":true},{"id":"dx66","name":"Rhabdomyolysis","icd":"M62.82","catId":"c7","color":"#3b82f6","signs":"Muscle pain/weakness/tenderness\nDark tea/cola-colored urine (myoglobinuria)\nSwelling of affected muscles\nFever\nNausea/vomiting\nConfusion (if AKI/electrolyte disturbance)\nOliguria/anuria (AKI)\nAbdominal pain","treatment":"1. Aggressive IV fluid resuscitation (NS 200-300mL/h)\n2. Target UOP 200-300mL/h\n3. Monitor and correct electrolytes aggressively\n4. Treat hyperkalemia emergently if present\n5. Avoid nephrotoxins\n6. Dialysis if AKI with refractory hyperkalemia, acidosis, fluid overload\n7. Compartment syndrome monitoring\n8. Treat underlying cause","meds":"NS 1-2L/h initially then 200-300mL/h (massive volumes may be needed)\nSodium bicarbonate 150mEq in 1L D5W (alkalinize urine to pH >6.5, controversial)\nCalcium gluconate 1g IV if hyperkalemic with ECG changes\nInsulin 10u + D50 (K shifting)\nMannitol 0.5g/kg IV (osmotic diuresis, controversial)","ddx":"AKI from other causes, Myositis, DVT, Compartment syndrome, DKA, Malignant hyperthermia, NMS","labs":"CK (>5x normal, often >10,000; severe >100,000)\nBMP (hyperkalemia, hyperphosphatemia, hypocalcemia early then hypercalcemia, AKI)\nUrinalysis (dipstick positive for blood but no RBCs = myoglobin)\nUrine myoglobin\nLDH, uric acid\nCoags (DIC risk)\nLactate\nABG/VBG (metabolic acidosis)","notes":"CK peaks at 24-72h, may take 5+ days to normalize\nCommon causes: trauma/crush, prolonged immobilization, seizures, drugs (statins, cocaine, MDMA), extreme exertion, heat stroke, NMS\nAKI risk increases with CK >15,000-20,000\nHypocalcemia: calcium deposits in damaged muscle - avoid IV calcium unless symptomatic or hyperkalemic with ECG changes\nLate hypercalcemia: as calcium mobilizes from healing muscle\nCompartment syndrome: maintain high index of suspicion","created":1772760232083,"builtIn":true},{"id":"dx67","name":"Hypothyroidism","icd":"E03.9","catId":"c6","color":"#eab308","signs":"Fatigue\nWeight gain\nCold intolerance\nConstipation\nDry skin/hair\nBradycardia\nPeripheral edema\nDelayed reflexes\nDepression\nMenorrhagia\nHoarse voice\nMyxedema","treatment":"1. Levothyroxine replacement\n2. Start low in elderly/cardiac patients\n3. Take on empty stomach, 30-60min before breakfast\n4. Monitor TSH q6-8 weeks until stable, then annually\n5. Adjust dose in pregnancy (increase 25-30%)","meds":"Levothyroxine 1.6mcg/kg/day (full replacement)\nStart 25-50mcg daily in elderly or cardiac\nIncrease by 25mcg q6-8wk to target TSH\nPregnancy: increase dose immediately by 25-30%","ddx":"Depression, Anemia, CHF, CKD, Sleep apnea, Chronic fatigue syndrome","labs":"TSH (elevated in primary, low/normal in secondary)\nFree T4 (low)\nTPO antibodies (Hashimoto)\nLipid panel (often dyslipidemia)\nCBC (anemia)","notes":"Hashimoto most common cause in developed world\nSubclinical: elevated TSH, normal free T4 - treat if TSH >10 or symptomatic\nMyxedema coma: severe hypothyroidism emergency\nDrug interactions: calcium, iron, PPI reduce absorption - separate by 4h\nBiotin supplements interfere with thyroid lab assays","created":1772760231083,"builtIn":true},{"id":"dx68","name":"Hyperthyroidism / Graves Disease","icd":"E05.00","catId":"c6","color":"#eab308","signs":"Weight loss despite increased appetite\nHeat intolerance\nTremor\nTachycardia/palpitations\nAnxiety/irritability\nDiarrhea\nExophthalmos (Graves)\nPretibial myxedema (Graves)\nThyroid bruit\nOnycholysis\nMenstrual irregularity","treatment":"1. Antithyroid drugs (methimazole preferred)\n2. Beta-blocker for symptom control\n3. Radioactive iodine ablation (definitive)\n4. Surgery (thyroidectomy) for large goiter/compressive symptoms\n5. Ophthalmology referral for Graves ophthalmopathy","meds":"Methimazole 10-30mg PO daily\nPTU 100-200mg TID (first trimester pregnancy only)\nPropranolol 20-40mg TID-QID\nAtenolol 25-100mg daily\nRadioactive iodine I-131 (definitive)\nPrednisone for moderate-severe ophthalmopathy","ddx":"Anxiety disorder, Pheochromocytoma, Thyroiditis (subacute, painless), Toxic multinodular goiter, Toxic adenoma, Factitious thyrotoxicosis","labs":"TSH (suppressed)\nFree T4 and T3 (elevated)\nTSI or TRAb (Graves specific)\nRadioactive iodine uptake and scan\nCBC (check before starting methimazole)\nLFTs","notes":"Graves: diffuse uptake on RAIU scan; Toxic nodule: focal hot nodule\nMethimazole risk: agranulocytosis (0.2-0.5%) - check WBC if fever/sore throat\nPTU risk: hepatotoxicity - only use in first trimester or thyroid storm\nGraves ophthalmopathy: may worsen with RAI - give prednisone prophylaxis if moderate\nSubclinical hyperthyroidism: low TSH, normal T3/T4 - treat if TSH <0.1 or symptomatic","created":1772760230083,"builtIn":true},{"id":"dx69","name":"Hyponatremia","icd":"E87.1","catId":"c7","color":"#3b82f6","signs":"Often asymptomatic if mild/chronic\nNausea/vomiting\nHeadache\nConfusion\nLethargy\nSeizures (severe)\nComa (severe)\nRespiratory arrest\nMuscle cramps\nFalls in elderly","treatment":"1. Classify: hypovolemic, euvolemic, hypervolemic\n2. Assess severity and chronicity\n3. Severe symptoms (seizures, coma): hypertonic saline 3% NaCl\n4. Chronic: correct slowly (<=8 mEq/L per 24h)\n5. SIADH: fluid restriction, salt tabs, possibly tolvaptan\n6. Hypovolemic: NS resuscitation\n7. Hypervolemic: fluid/sodium restriction, diuretics, treat underlying","meds":"3% NaCl 100-150mL IV bolus over 10min (repeat x2 if persistent severe symptoms)\nNS for hypovolemic\nFluid restriction 1-1.5L/day (SIADH)\nTolvaptan 15mg PO daily (SIADH, not liver disease)\nFurosemide + salt tabs (SIADH refractory to fluid restriction)\nDemeclocycline 300-600mg BID (SIADH, rarely used)","ddx":"Pseudohyponatremia (hyperlipidemia, hyperproteinemia)\nHypovolemic: diuretics, vomiting, diarrhea, adrenal insufficiency\nEuvolemic: SIADH, hypothyroidism, cortisol deficiency\nHypervolemic: CHF, cirrhosis, nephrotic syndrome, CKD","labs":"Serum Na, serum osmolality\nUrine osmolality, urine Na\nBMP\nTSH, cortisol (rule out hypothyroidism, adrenal insufficiency)\nLFTs, albumin\nUric acid (low in SIADH)\nCXR, CT head (SIADH causes)","notes":"Osmotic demyelination syndrome (ODS/CPM): risk if correcting >8-10 mEq/L in 24h in chronic hyponatremia\nHigh risk for ODS: Na <105, alcoholism, malnutrition, liver disease, hypokalemia\nSIADH criteria: euvolemic, low serum osm, inappropriately concentrated urine (>100), urine Na >40, normal thyroid/adrenal\nCorrection rate: <=8 mEq/L per 24h for chronic; can be faster for acute (<48h)\nIf overcorrected: D5W +/- DDAVP to lower sodium back down","created":1772760229083,"builtIn":true},{"id":"dx70","name":"Acute Coronary Syndrome - Unstable Angina","icd":"I20.0","catId":"c1","color":"#f43f5e","signs":"Chest pain at rest or crescendo pattern\nNew-onset angina with minimal exertion\nSimilar presentation to NSTEMI\nNo troponin elevation\nECG may show ST depression, T-wave inversion, or be normal\nDyspnea\nDiaphoresis","treatment":"Same as NSTEMI approach:\n1. Antiplatelet therapy (aspirin + P2Y12 inhibitor)\n2. Anticoagulation\n3. Risk stratification (TIMI, GRACE)\n4. Stress test or coronary angiography based on risk\n5. Beta-blocker, statin, nitrates\n6. Medical optimization","meds":"Aspirin 325mg then 81mg daily\nClopidogrel 300-600mg load then 75mg daily or Ticagrelor 180mg then 90mg BID\nHeparin or enoxaparin\nMetoprolol 25-50mg PO BID\nAtorvastatin 80mg daily\nNitroglycerin SL or IV","ddx":"NSTEMI, Stable angina, GERD, Costochondritis, PE, Anxiety, Aortic dissection","labs":"Serial troponin (negative by definition for UA)\n12-lead ECG (serial)\nCBC, BMP, lipids\nBNP\nCXR\nStress test or coronary angiography","notes":"Unstable angina + NSTEMI = NSTE-ACS\nWith high-sensitivity troponin, true unstable angina is less commonly diagnosed\nTIMI risk score guides invasive vs conservative strategy\nDifference from NSTEMI: no troponin elevation\nHigh-risk features: recurrent pain, ST changes, hemodynamic instability, high TIMI/GRACE score","created":1772760228083,"builtIn":true},{"id":"dx71","name":"Mesenteric Ischemia","icd":"K55.069","catId":"c4","color":"#f97316","signs":"Severe abdominal pain out of proportion to exam\nNausea/vomiting\nDiarrhea (may be bloody)\nAbdominal distension\nBowel sounds initially hyperactive then absent\nPeritonitis (late)\nShock (late)\nLactic acidosis","treatment":"1. Aggressive IV fluid resuscitation\n2. Broad-spectrum antibiotics\n3. Anticoagulation with heparin\n4. Emergent CTA\n5. Surgical embolectomy or revascularization\n6. Endovascular thrombectomy/thrombolysis for selected cases\n7. Bowel resection if nonviable bowel\n8. Second-look laparotomy in 24-48h","meds":"Heparin 80u/kg bolus then 18u/kg/h\nPiperacillin-tazobactam 4.5g IV q6h\nNS/LR aggressive resuscitation\nVasodilators (papaverine) intra-arterial in some cases\nAvoid vasopressors if possible (worsen ischemia)","ddx":"SBO, Pancreatitis, AAA rupture, Volvulus, Diverticulitis, Perforated viscus, MI, Aortic dissection","labs":"Lactate (elevated, often >2)\nCTA abdomen (filling defect in SMA/SMV, bowel wall changes)\nCBC (leukocytosis)\nBMP (metabolic acidosis)\nLDH (elevated)\nD-dimer\nABG (metabolic acidosis)\nAmylase/lipase","notes":"Pain out of proportion to exam is classic and should raise suspicion\nAcute arterial (SMA embolism most common, often AFib)\nAcute venous (MVT: hypercoagulable states)\nNon-occlusive (low flow: shock, vasopressors, cardiac failure)\nChronic: postprandial pain, food fear, weight loss (intestinal angina)\nMortality 60-80% if bowel necrosis develops\nAFib is most common source of embolism to SMA","created":1772760227083,"builtIn":true},{"id":"dx72","name":"Toxic Megacolon","icd":"K59.31","catId":"c4","color":"#f97316","signs":"Abdominal distension\nAbdominal pain/tenderness\nFever >38.6C\nTachycardia >120\nLeukocytosis >10.5k\nAnemia\nDehydration\nAltered mental status\nDecreased bowel sounds\nRebound/guarding (perforation)","treatment":"1. NPO, NGT decompression\n2. IV fluids and electrolyte correction\n3. IV antibiotics (broad spectrum)\n4. Stop anti-motility agents (opioids, anticholinergics, loperamide)\n5. Serial abdominal X-rays q12h\n6. Knee-chest position, rolling q2h (decompressive)\n7. Surgical consultation: colectomy if no improvement in 24-72h or perforation","meds":"Piperacillin-tazobactam 4.5g IV q6h or Meropenem 1g IV q8h\nVancomycin 500mg PO/PR QID (if C. diff)\nMetronidazole 500mg IV q8h (if C. diff)\nIV fluids aggressively\nBlood transfusion if anemic\nAvoid opioids, anticholinergics","ddx":"SBO, Ogilvie syndrome (colonic pseudo-obstruction), Volvulus, Ischemic colitis, Perforated viscus","labs":"Abdominal X-ray (transverse colon >6cm or cecum >9cm)\nCBC (leukocytosis, anemia)\nBMP\nLactate\nBlood cultures\nC. diff testing\nCT abdomen (if perforation suspected)\nSerial KUB","notes":"Definition: radiographic colon dilation + systemic toxicity\nMost common causes: IBD (especially UC), C. diff, ischemic colitis\nPerforation risk increases with colon diameter and duration\nIndicators for surgery: perforation, uncontrolled hemorrhage, progressive dilation despite 48-72h medical therapy\nAvoid colonoscopy and barium enema in acute toxic megacolon\nMortality: 20% without perforation, 40%+ with perforation","created":1772760226083,"builtIn":true},{"id":"dx73","name":"Pulmonary Hypertension","icd":"I27.20","catId":"c2","color":"#06b6d4","signs":"Progressive dyspnea on exertion\nFatigue\nChest pain\nSyncope/presyncope\nPeripheral edema\nJVD\nLoud P2 (pulmonic component of S2)\nRV heave\nTricuspid regurgitation murmur\nHepatomegaly\nAscites","treatment":"1. Classify WHO Group (1-5) - treatment differs\n2. Group 1 (PAH): pulmonary vasodilators\n3. Group 2 (left heart): treat underlying cardiac disease\n4. Group 3 (lung disease): treat underlying lung disease, O2\n5. Group 4 (CTEPH): pulmonary endarterectomy, riociguat\n6. Diuretics for fluid overload\n7. Anticoagulation (especially Group 1, Group 4)\n8. Supplemental O2\n9. Lung transplant for refractory","meds":"Sildenafil 20mg TID or Tadalafil 40mg daily (PDE5i)\nAmbrisentan 5-10mg daily (ERA)\nBosentan 62.5-125mg BID (ERA)\nEpoprostenol IV continuous (prostacyclin - severe)\nTreprostinil SC/IV/inhaled\nRiociguat 1-2.5mg TID (sGC stimulator, Group 4)\nFurosemide for fluid management\nWarfarin (selected patients)","ddx":"COPD, CHF, PE (chronic thromboembolic), Interstitial lung disease, Sleep apnea, Valvular heart disease, Connective tissue disease","labs":"Echo (RVSP estimate, RV dilation/dysfunction)\nRight heart catheterization (gold standard: mPAP >=20mmHg)\nPFTs and DLCO\nV/Q scan (rule out CTEPH)\nCT chest\n6-minute walk test\nBNP/NT-proBNP\nANA, HIV, LFTs (connective tissue disease, portopulmonary)\nSleep study if suspected OSA\nHRCT","notes":"WHO Groups: 1-PAH, 2-Left heart, 3-Lung disease, 4-CTEPH, 5-Multifactorial\nRight heart cath defines PH: mPAP >=20mmHg\nPre-capillary: PAWP <=15; Post-capillary: PAWP >15\nVasoreactivity testing during RHC (if Group 1): CCB if positive\nAvoid pregnancy (30-50% mortality)\nEpoprostenol: never abruptly discontinue (rebound PH crisis)\nPrognosis varies widely by group and functional class","created":1772760225083,"builtIn":true},{"id":"dx74","name":"Acute Pericardial Effusion","icd":"I30.9","catId":"c1","color":"#f43f5e","signs":"Dyspnea (most common)\nChest pain/pressure\nMuffled heart sounds\nTachycardia\nFriction rub (may disappear as fluid accumulates)\nJVD\nEwart sign (dullness below left scapula)\nPulsus paradoxus\nHepatomegaly","treatment":"1. Echo-guided pericardiocentesis if hemodynamic compromise\n2. NSAIDs + colchicine if inflammatory\n3. Drain if large/symptomatic or concern for bacterial/TB\n4. Pericardial window for recurrent\n5. Treat underlying cause\n6. Send pericardial fluid for analysis","meds":"Ibuprofen 600mg TID + Colchicine 0.5mg BID (if inflammatory)\nPericardiocentesis for drainage\nIntrapericardial triamcinolone (prevent recurrence)\nAntibiotics if purulent\nAnti-TB therapy if tuberculous","ddx":"Cardiac tamponade, CHF, Constrictive pericarditis, Pleural effusion, MI, PE","labs":"Echo (effusion size, tamponade physiology)\nECG (low voltage, electrical alternans)\nCXR (enlarged cardiac silhouette if >250mL)\nPericardial fluid: cell count, protein, LDH, glucose, cytology, culture, ADA, PCR\nBlood: CBC, BMP, ESR/CRP\nTSH, ANA, HIV\nTB testing","notes":"Rate of accumulation matters more than size\nRapid: 150-200mL can cause tamponade\nSlow: 1-2L can accumulate without tamponade\nCauses: viral/idiopathic, malignancy, uremia, bacterial, TB, autoimmune, post-MI (Dressler), post-cardiac surgery, hypothyroidism\nADA >40 suggests TB in high-prevalence areas\nHemorrhagic: malignancy, TB, uremia, post-procedure","created":1772760224083,"builtIn":true},{"id":"dx75","name":"Ventricular Tachycardia","icd":"I47.2","catId":"c1","color":"#f43f5e","signs":"Palpitations\nDizziness/lightheadedness\nSyncope\nChest pain\nDyspnea\nHypotension\nWide complex tachycardia on ECG\nAV dissociation\nCannon A waves in JVP\nCardiac arrest (pulseless VT)","treatment":"1. Pulseless VT: defibrillation per ACLS protocol\n2. Unstable with pulse: synchronized cardioversion\n3. Stable monomorphic VT: IV amiodarone or procainamide\n4. Polymorphic VT (normal QT): treat as VF - defibrillation + amiodarone\n5. Torsades de Pointes: IV magnesium, isoproterenol, overdrive pacing\n6. Correct electrolytes (K, Mg)\n7. ICD evaluation for secondary prevention","meds":"Amiodarone 150mg IV over 10min then 1mg/min x6h then 0.5mg/min\nProcainamide 20-50mg/min until arrhythmia suppressed (max 17mg/kg)\nLidocaine 1-1.5mg/kg IV bolus then 1-4mg/min\nMagnesium 2g IV over 5-20min (Torsades)\nIsoproterenol 2-10mcg/min (Torsades)\nMetoprolol if ischemia-related","ddx":"SVT with aberrancy, Pre-excited tachycardia (WPW), Hyperkalemia, Artifact, Ventricular paced rhythm","labs":"12-lead ECG (wide QRS >120ms, rate >100)\nBMP (K, Mg, Ca)\nTroponin\nMagnesium level\nDrug levels (digoxin, QT-prolonging meds)\nEcho (structural heart disease)\nContinuous telemetry\nElectrophysiology study (EP study)","notes":"Wide complex tachycardia: treat as VT until proven otherwise\nBrugada criteria for differentiating VT from SVT with aberrancy\nAV dissociation, fusion beats, capture beats = VT\nCommon causes: ischemia/MI, structural heart disease, electrolyte abnormalities, drugs\nTorsades: polymorphic VT + prolonged QT interval\nQT-prolonging drugs: antiarrhythmics, antibiotics (macrolides, fluoroquinolones), antipsychotics, methadone\nICD indicated for survivors of VT/VF arrest (secondary prevention)","created":1772760223083,"builtIn":true},{"id":"dx76","name":"Aortic Stenosis","icd":"I35.0","catId":"c1","color":"#f43f5e","signs":"Exertional dyspnea\nAngina\nSyncope/presyncope\nCrescendo-decrescendo systolic murmur (RUSB, radiates to carotids)\nDiminished and delayed carotid upstroke (pulsus parvus et tardus)\nNarrow pulse pressure\nS4 gallop\nHeart failure (late)","treatment":"1. Symptomatic severe AS: valve replacement (TAVR or SAVR)\n2. Asymptomatic severe: monitor, exercise testing, intervene if EF drops\n3. Medical management limited (does not change natural history)\n4. Avoid excessive preload/afterload reduction\n5. Balloon valvuloplasty as bridge to definitive therapy\n6. TAVR preferred in intermediate-high surgical risk","meds":"Limited medical therapy:\nCautious diuretics for fluid overload\nAvoid vasodilators (nitrates, ACEi) in severe AS - can cause syncope\nStatins do NOT slow progression\nBeta-blockers cautiously if needed\nIE prophylaxis for prosthetic valves","ddx":"HOCM, Subaortic membrane, Mitral regurgitation, Aortic sclerosis (no gradient), VSD","labs":"Echo (valve area, mean gradient, peak velocity)\nSevere: AVA <1.0cm2, mean gradient >40mmHg, peak velocity >4m/s\nECG (LVH, LAE)\nCXR (calcified aortic valve, cardiomegaly)\nCT calcium scoring\nCardiac catheterization (if discrepancy)\nBNP","notes":"Classic triad: angina, syncope, heart failure\nOnce symptomatic, prognosis poor without intervention:\nAngina: 5yr survival; Syncope: 3yr; Heart failure: 2yr\nBicuspid aortic valve: most common cause in <70; Degenerative calcific in >70\nLow-flow low-gradient AS: dobutamine stress echo to differentiate true-severe from pseudo-severe\nTAVR: transcatheter aortic valve replacement - preferred route for most patients now","created":1772760222083,"builtIn":true},{"id":"dx77","name":"Nephrotic Syndrome","icd":"N04.9","catId":"c7","color":"#3b82f6","signs":"Severe peripheral edema (pitting)\nPeriorbital edema\nAnasarca\nFoamy urine (proteinuria)\nWeight gain\nFatigue\nDyspnea (pleural effusions)\nAscites\nHyperlipidemia\nInfection susceptibility","treatment":"1. Treat underlying cause\n2. ACEi or ARB (reduce proteinuria)\n3. Sodium restriction <2g/day\n4. Diuretics for edema (loop +/- thiazide)\n5. Statin for hyperlipidemia\n6. Anticoagulation if high VTE risk (especially membranous)\n7. Immunosuppression based on biopsy results\n8. Pneumococcal vaccination","meds":"Lisinopril 10-40mg daily or Losartan 50-100mg daily\nFurosemide 40-80mg PO BID + Metolazone 2.5-5mg (if resistant)\nAtorvastatin 40-80mg daily\nAlbumin 25% IV + furosemide (severe edema with low albumin)\nPrednisone 1mg/kg/day (minimal change disease)\nCyclophosphamide, rituximab, tacrolimus (based on histology)","ddx":"Nephritic syndrome, CHF, Cirrhosis, Protein-losing enteropathy, Malnutrition, Myxedema","labs":"Urinalysis (3-4+ protein, lipiduria, oval fat bodies)\n24h urine protein >3.5g/day (or spot protein/Cr >3.5)\nSerum albumin (<3g/dL)\nLipid panel (elevated)\nBMP (renal function)\nComplement levels (C3, C4)\nANA, anti-PLA2R (membranous), Hep B/C, HIV\nRenal biopsy (definitive for classification)","notes":"Nephrotic vs Nephritic: Nephrotic = massive proteinuria, hypoalbuminemia, edema, hyperlipidemia; Nephritic = hematuria, HTN, mild proteinuria, RBC casts\nMost common in adults: Membranous nephropathy, FSGS, Minimal change disease\nMost common in children: Minimal change disease\nVTE risk: loss of antithrombin III, especially membranous\nSBP risk: loss of immunoglobulins\nAnti-PLA2R positive = primary membranous","created":1772760221083,"builtIn":true},{"id":"dx78","name":"Urolithiasis / Renal Colic","icd":"N20.0","catId":"c7","color":"#3b82f6","signs":"Severe colicky flank pain radiating to groin\nHematuria (gross or microscopic)\nNausea/vomiting\nRestlessness (cannot find comfortable position)\nCVA tenderness\nUrinary frequency/urgency\nDysuria\nTesticular/labial pain (referred)","treatment":"1. Pain management (NSAIDs first-line + opioids if needed)\n2. Hydration\n3. Alpha-blocker for medical expulsive therapy (stones 5-10mm)\n4. <5mm: likely to pass spontaneously (>90%)\n5. 5-10mm: medical expulsive therapy, may need intervention\n6. >10mm or failed passage: urologic intervention (SWL, ureteroscopy, PCNL)\n7. Emergent: infected obstructed stone = urology STAT","meds":"Ketorolac 30mg IV/15mg IM (first-line analgesic)\nIbuprofen 600mg PO q8h\nMorphine 0.1mg/kg IV or Hydromorphone 0.5-1mg IV PRN\nTamsulosin 0.4mg PO daily (medical expulsive therapy)\nNifedipine 30mg PO daily (alternative MET)\nOndansetron 4mg IV PRN","ddx":"Pyelonephritis, Appendicitis, Ovarian torsion, Ectopic pregnancy, AAA, Musculoskeletal back pain, Renal infarction","labs":"Urinalysis (hematuria in 85%, r/o infection)\nUrine culture\nBMP (creatinine, calcium)\nCBC (leukocytosis if infected)\nCT abdomen/pelvis without contrast (gold standard)\nUS (first-line in pregnancy, children)\nStrain urine for stone analysis\n24h urine collection (recurrent stone formers)","notes":"Stone composition: Calcium oxalate (80%), Uric acid (10%), Struvite (5-10%), Cystine (1%)\nInfected obstructed stone = EMERGENCY - sepsis risk, needs emergent decompression (stent or nephrostomy)\nUric acid stones: radiolucent on X-ray, seen on CT\nStruvite: staghorn calculi, associated with urease-producing organisms (Proteus)\nPrevention: hydration (>2.5L/day), dietary modification based on stone type\nRecurrence rate ~50% within 5-10 years without prevention","created":1772760220083,"builtIn":true},{"id":"dx79","name":"Spinal Cord Compression","icd":"G95.20","catId":"c3","color":"#a855f7","signs":"Back pain (often first symptom)\nWeakness/paralysis below level of compression\nSensory level\nBowel/bladder dysfunction (urinary retention, incontinence)\nSaddle anesthesia (cauda equina)\nHyperreflexia below lesion (UMN) or hyporeflexia (LMN/cauda equina)\nBabinski sign positive","treatment":"1. MRI whole spine STAT\n2. High-dose dexamethasone if malignant compression\n3. Neurosurgical consultation\n4. Radiation oncology consultation for malignant\n5. Surgical decompression (emergency if progressive deficit)\n6. Foley catheter if urinary retention\n7. DVT prophylaxis\n8. Treat underlying cause","meds":"Dexamethasone 10mg IV bolus then 4mg IV q6h (malignant compression)\nPain management: scheduled acetaminophen + opioids PRN\nGabapentin 300mg TID (neuropathic pain)\nEnoxaparin 40mg SC daily (DVT prophylaxis after surgery)","ddx":"Transverse myelitis, Epidural abscess, Epidural hematoma, Disc herniation, GBS, Multiple sclerosis, Spinal infarction","labs":"MRI whole spine with contrast (gold standard)\nPlain X-rays (may show lytic/blastic lesions, loss of pedicle)\nCT myelography if MRI contraindicated\nCBC, BMP, ESR/CRP\nPSA, SPEP (if unknown primary)\nPost-void residual (urinary retention)\nBlood cultures if abscess suspected","notes":"Oncologic emergency: malignant cord compression, typically metastatic (lung, breast, prostate, renal, myeloma)\nCauda equina syndrome: saddle anesthesia, urinary retention, bilateral leg weakness/pain - surgical emergency\nSurgical decompression within 24-48h gives best outcomes\nIf cannot get MRI within 4h and high suspicion, start dexamethasone empirically\nEpidural abscess: fever + back pain + neuro deficit = MRI STAT (S. aureus most common)","created":1772760219083,"builtIn":true},{"id":"dx80","name":"Diabetic Emergencies - Hypoglycemia","icd":"E16.2","catId":"c6","color":"#eab308","signs":"Tremor\nDiapho // ─── PERSISTENCE (localStorage + IndexedDB for embeddings) ───
function loadData() {
  try { return JSON.parse(localStorage.getItem('medref_data') || '{}'); } catch { return {}; }
}
function saveData(data) {
  localStorage.setItem('medref_data', JSON.stringify(data));
}

function getData() {
  let d = loadData();
  if (!d.categories || d.categories.length === 0) d.categories = [...BUILTIN_CATEGORIES];
  if (!d.diagnoses || d.diagnoses.length === 0) {
    d.diagnoses = BUILTIN_DIAGNOSES.map(dx => ({...dx}));
    saveData(d);
  }
  // Merge any new built-in diagnoses not already present
  const existingIds = new Set(d.diagnoses.map(x => x.id));
  BUILTIN_DIAGNOSES.forEach(bdx => {
    if (!existingIds.has(bdx.id)) {
      d.diagnoses.push({...bdx});
    }
  });
  // Merge any new categories
  const existingCatIds = new Set(d.categories.map(c => c.id));
  BUILTIN_CATEGORIES.forEach(bc => {
    if (!existingCatIds.has(bc.id)) d.categories.push({...bc});
  });
  if (!d.recent) d.recent = [];
  return d;
}

// ─── IndexedDB for embeddings ───
const DB_NAME = 'medref_embeddings';
const DB_VERSION = 1;
let embeddingDB = null;

function openEmbeddingDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('embeddings')) {
        db.createObjectStore('embeddings', { keyPath: 'id' });
      }
    };
    req.onsuccess = (e) => { embeddingDB = e.target.result; resolve(embeddingDB); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function getEmbedding(id) {
  return new Promise((resolve, reject) => {
    const tx = embeddingDB.transaction('embeddings', 'readonly');
    const req = tx.objectStore('embeddings').get(id);
    req.onsuccess = () => resolve(req.result ? req.result.embedding : null);
    req.onerror = () => resolve(null);
  });
}

function putEmbedding(id, embedding) {
  return new Promise((resolve, reject) => {
    const tx = embeddingDB.transaction('embeddings', 'readwrite');
    tx.objectStore('embeddings').put({ id, embedding: Array.from(embedding) });
    tx.oncomplete = () => resolve();
    tx.onerror = () => resolve();
  });
}

function getAllEmbeddings() {
  return new Promise((resolve) => {
    const tx = embeddingDB.transaction('embeddings', 'readonly');
    const req = tx.objectStore('embeddings').getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => resolve([]);
  });
}

// ─── SEMANTIC SEARCH ENGINE ───
let semanticReady = false;
let extractor = null;
let embeddingCache = new Map(); // id -> Float32Array

function dxSearchText(dx) {
  return [dx.name, dx.icd, dx.signs, dx.ddx, dx.treatment, dx.meds, dx.labs, dx.notes].filter(Boolean).join(' ');
}

function cosineSim(a, b) {
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
    na += a[i] * a[i];
    nb += b[i] * b[i];
  }
  return dot / (Math.sqrt(na) * Math.sqrt(nb) + 1e-8);
}

async function initSemanticSearch() {
  const badge = document.getElementById('ai-badge');
  badge.className = 'loading';
  badge.textContent = 'AI loading...';

  try {
    const { pipeline } = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.4.1');
    extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', {
      dtype: 'q8',
    });

    badge.className = 'ready';
    badge.textContent = 'AI';

    // Load cached embeddings from IndexedDB
    const stored = await getAllEmbeddings();
    stored.forEach(e => { embeddingCache.set(e.id, new Float32Array(e.embedding)); });

    // Embed any diagnoses that don't have embeddings yet
    const d = getData();
    let newCount = 0;
    for (const dx of d.diagnoses) {
      if (!embeddingCache.has(dx.id)) {
        const text = dxSearchText(dx);
        const output = await extractor(text, { pooling: 'mean', normalize: true });
        const emb = new Float32Array(output.data);
        embeddingCache.set(dx.id, emb);
        await putEmbedding(dx.id, emb);
        newCount++;
        if (newCount % 10 === 0) {
          badge.textContent = 'AI ' + Math.round((newCount / d.diagnoses.length) * 100) + '%';
        }
      }
    }

    semanticReady = true;
    badge.textContent = 'AI ✓';
    setTimeout(() => { badge.textContent = 'AI'; }, 2000);

    // If there's a pending search and detail view is not open, re-run it
    if (state.search && !state.viewingId) renderList();

  } catch (err) {
    console.error('Semantic search failed to load:', err);
    badge.className = 'off';
    badge.textContent = '';
  }
}

async function semanticSearch(query, diagnoses) {
  if (!semanticReady || !extractor) return null;
  try {
    const output = await extractor(query, { pooling: 'mean', normalize: true });
    const queryEmb = new Float32Array(output.data);

    const scored = diagnoses.map(dx => {
      const emb = embeddingCache.get(dx.id);
      if (!emb) return { dx, score: 0 };
      return { dx, score: cosineSim(queryEmb, emb) };
    });

    scored.sort((a, b) => b.score - a.score);
    return scored.filter(s => s.score > 0.15);
  } catch {
    return null;
  }
}

  getData(); // ensure data initialized
  buildColorRow();
  buildCatPickRow();
  render();
  setupSearch();

  if (!localStorage.getItem('medref_banner_dismissed') && !isInstalled()) {
    setTimeout(() => document.getElementById('install-banner').classList.remove('hidden'), 2000);
  } else {
    document.getElementById('install-banner').classList.add('hidden');
  }

  // Init IndexedDB then semantic search
  try {
    await openEmbeddingDB();
    initSemanticSearch(); // fire and forget
  } catch (e) {
    console.error('IndexedDB error:', e);
  }
});

function isInstalled() {
  return window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
}
function dismissBanner() {
  localStorage.setItem('medref_banner_dismissed', '1');
  document.getElementById('install-banner').classList.add('hidden');
}
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }

// ─── RENDER ───
function render() {
  renderCategoryBar();
  renderList();
}

function renderCategoryBar() {
  const d = getData();
  const bar = document.getElementById('category-bar');
  if (state.tab !== 'category') { bar.innerHTML = ''; return; }
  let html = '<button class="cat-pill ' + (state.catFilter==='all'?'active':'') + '" style="' + (state.catFilter==='all'?'background:var(--accent2);border-color:var(--accent2);':'') + '" onclick="setCatFilter(\'all\')">All</button>';
  d.categories.forEach(cat => {
    const active = state.catFilter === cat.id;
    html += '<button class="cat-pill ' + (active?'active':'') + '" style="' + (active?'background:'+cat.color+';border-color:'+cat.color+';':'') + '" onclick="setCatFilter(\'' + cat.id + '\')">' + cat.name + '</button>';
  });
  html += '<button class="cat-pill" onclick="openCatManager()" style="border-style:dashed;">⚙ Manage</button>';
  bar.innerHTML = html;
}

function renderList() {
  const d = getData();
  const list = document.getElementById('dx-list');
  let diagnoses = [...d.diagnoses];

  // filter by search
  if (state.search) {
    const q = state.search.toLowerCase();

    // If we have semantic results, use them
    if (state.semanticResults && state.semanticResults.length > 0) {
      const resultIds = new Set(state.semanticResults.map(r => r.dx.id));
      // Also include substring matches
      const substringMatches = diagnoses.filter(dx =>
        !resultIds.has(dx.id) && (
          dx.name.toLowerCase().includes(q) ||
          (dx.icd||'').toLowerCase().includes(q) ||
          (dx.signs||'').toLowerCase().includes(q) ||
          (dx.ddx||'').toLowerCase().includes(q) ||
          (dx.meds||'').toLowerCase().includes(q) ||
          (dx.notes||'').toLowerCase().includes(q)
        )
      ).map(dx => ({ dx, score: 0.1 }));

      const combined = [...state.semanticResults, ...substringMatches];
      diagnoses = combined.map(r => ({...r.dx, _score: r.score}));
    } else {
      // Fallback to substring search
      diagnoses = diagnoses.filter(dx =>
        dx.name.toLowerCase().includes(q) ||
        (dx.icd||'').toLowerCase().includes(q) ||
        (dx.signs||'').toLowerCase().includes(q) ||
        (dx.ddx||'').toLowerCase().includes(q) ||
        (dx.meds||'').toLowerCase().includes(q) ||
        (dx.notes||'').toLowerCase().includes(q)
      );
    }
  }

  // filter by category
  if (state.tab === 'category' && state.catFilter !== 'all') {
    diagnoses = diagnoses.filter(dx => dx.catId === state.catFilter);
  }

  // recent tab
  if (state.tab === 'recent') {
    const recent = d.recent || [];
    diagnoses = recent.map(id => diagnoses.find(dx => dx.id === id)).filter(Boolean);
  }

  if (diagnoses.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🩻</div><div class="empty-state-title">' + (state.search ? 'No results found' : 'No diagnoses yet') + '</div><div class="empty-state-sub">' + (state.search ? 'Try a different search term' : 'Tap <strong>+ Add Dx</strong> to add your first diagnosis') + '</div></div>';
    return;
  }

  // If searching with semantic results, keep score order
  if (state.search && (state.semanticResults || []).length > 0) {
    list.innerHTML = diagnoses.map(dx => dxCardHTML(dx, d, dx._score)).join('');
    return;
  }

  if (state.tab === 'recent') {
    list.innerHTML = diagnoses.map(dx => dxCardHTML(dx, d)).join('');
    return;
  }

  // Sort A-Z and group
  diagnoses.sort((a, b) => a.name.localeCompare(b.name));
  const groups = {};
  diagnoses.forEach(dx => {
    const letter = dx.name[0].toUpperCase();
    if (!groups[letter]) groups[letter] = [];
    groups[letter].push(dx);
  });
  let html = '';
  Object.keys(groups).sort().forEach(letter => {
    html += '<div class="section-letter">' + letter + '</div>';
    groups[letter].forEach(dx => { html += dxCardHTML(dx, d); });
  });
  list.innerHTML = html;
}

function dxCardHTML(dx, d, score) {
  const cat = (d.categories || []).find(c => c.id === dx.catId);
  const color = dx.color || '#06b6d4';
  const scoreHTML = score && score > 0.15 ? '<span class="dx-score">' + Math.round(score * 100) + '% match</span>' : '';
  return '<div class="dx-card" onclick="openDetail(\'' + dx.id + '\')">' +
    '<div class="dx-card-header">' +
    '<div class="dx-color-bar" style="background:' + color + '"></div>' +
    '<div class="dx-card-info">' +
    '<div class="dx-name">' + escHtml(dx.name) + '</div>' +
    '<div class="dx-meta">' +
    (dx.icd ? '<span class="dx-icd">' + escHtml(dx.icd) + '</span>' : '') +
    (cat ? '<span class="dx-cat-badge" style="background:' + cat.color + '22;color:' + cat.color + '">' + escHtml(cat.name) + '</span>' : '') +
    '</div></div>' + scoreHTML +
    '<span class="dx-card-chevron">›</span>' +
    '</div></div>';
}

// ─── DETAIL ───
function openDetail(id) {
  const d = getData();
  const dx = d.diagnoses.find(x => x.id === id);
  if (!dx) return;
  state.viewingId = id;
  d.recent = [id, ...(d.recent||[]).filter(r => r !== id)].slice(0, 30);
  saveData(d);
  const cat = (d.categories || []).find(c => c.id === dx.catId);
  const color = dx.color || '#06b6d4';
  document.getElementById('detail-name').textContent = dx.name;
  let metaHTML = '';
  if (dx.icd) metaHTML += '<span class="dx-icd" style="font-size:13px;">' + escHtml(dx.icd) + '</span>';
  if (cat) metaHTML += '<span class="dx-cat-badge" style="background:' + cat.color + '22;color:' + cat.color + ';font-size:13px;">' + escHtml(cat.name) + '</span>';
  let bodyHTML = '<div class="detail-meta-row">' + metaHTML + '</div>';
  [{key:'signs',text:dx.signs},{key:'treatment',text:dx.treatment},{key:'meds',text:dx.meds},{key:'labs',text:dx.labs},{key:'notes',text:dx.notes}].forEach(({key,text}) => {
    if (!text) return;
    const sec = SECTION_COLORS[key];
    bodyHTML += '<div class="section-card"><div class="section-card-header" style="background:' + sec.bg + '"><div class="section-icon" style="background:' + sec.bg + '">' + sec.icon + '</div><div class="section-title">' + sec.label + '</div></div><div class="section-content">' + formatContent(text) + '</div></div>';
  });
  if (dx.ddx) {
    const items = dx.ddx.split(',').map(s => s.trim()).filter(Boolean);
    bodyHTML += '<div class="section-card"><div class="section-card-header" style="background:rgba(244,63,94,0.12)"><div class="section-icon" style="background:rgba(244,63,94,0.12)">⚖️</div><div class="section-title">Differential Diagnoses</div></div><div class="tag-list">' + items.map(i => '<span class="tag">' + escHtml(i) + '</span>').join('') + '</div></div>';
  }
  document.getElementById('detail-body').innerHTML = '<div style="height:5px;background:' + color + ';border-radius:12px;margin-bottom:16px;"></div>' + bodyHTML;
  document.getElementById('detail-view').classList.add('open');
}

function formatContent(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  if (lines.length > 1) return '<ul>' + lines.map(l => '<li>' + escHtml(l) + '</li>').join('') + '</ul>';
  return escHtml(text);
}

function closeDetail() {
  state.viewingId = null;
  document.getElementById('detail-view').classList.remove('open');
  render();
}
function editCurrentDx() { if (state.viewingId) openModal(state.viewingId); }
function deleteCurrentDx() {
  if (!state.viewingId) return;
  if (!confirm('Delete this diagnosis?')) return;
  const d = getData();
  d.diagnoses = d.diagnoses.filter(x => x.id !== state.viewingId);
  d.recent = (d.recent||[]).filter(r => r !== state.viewingId);
  saveData(d);
  closeDetail();
}

      document.getElementById('f-notes').value = dx.notes || '';
      state.selectedColor = dx.color || COLORS[0];
    }
  } else {
    document.getElementById('modal-title').textContent = 'New Diagnosis';
    ['f-name','f-icd','f-signs','f-treatment','f-meds','f-ddx','f-labs','f-notes'].forEach(id => document.getElementById(id).value = '');
    sel.value = '';
    state.selectedColor = COLORS[0];
  }
  updateColorSwatches();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 300);
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  state.editingId = null;
}
async function saveDx() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Diagnosis name is required.'); return; }
  const d = getData();
  const record = {
    id: state.editingId || uid(),
    name,
    icd: document.getElementById('f-icd').value.trim(),
    catId: document.getElementById('f-cat').value,
    color: state.selectedColor,
    signs: document.getElementById('f-signs').value.trim(),
    treatment: document.getElementById('f-treatment').value.trim(),
    meds: document.getElementById('f-meds').value.trim(),
    ddx: document.getElementById('f-ddx').value.trim(),
    labs: document.getElementById('f-labs').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    created: state.editingId ? (d.diagnoses.find(x=>x.id===state.editingId)||{}).created || Date.now() : Date.now(),
    updated: Date.now(),
  };
  if (state.editingId) {
    d.diagnoses = d.diagnoses.map(x => x.id === state.editingId ? record : x);
  } else {
    d.diagnoses.push(record);
  }
  saveData(d);

  // Generate embedding for new/edited diagnosis
  if (semanticReady && extractor) {
    try {
      const text = dxSearchText(record);
      const output = await extractor(text, { pooling: 'mean', normalize: true });
      const emb = new Float32Array(output.data);
      embeddingCache.set(record.id, emb);
      await putEmbedding(record.id, emb);
    } catch {}
  }

  closeModal();
  if (state.editingId) { state.viewingId = record.id; openDetail(record.id); }
  else { closeDetail(); render(); }
}

// ─── COLOR SWATCHES ───
function buildColorRow() {
  document.getElementById('color-row').innerHTML = COLORS.map(c =>
    '<div class="color-swatch ' + (c===state.selectedColor?'selected':'') + '" style="background:' + c + '" onclick="selectColor(\'' + c + '\')"></div>'
  ).join('');
}
function updateColorSwatches() {
  document.querySelectorAll('#color-row .color-swatch').forEach(el => {
    el.classList.toggle('selected', el.style.background === state.selectedColor || el.style.background === hexToRgb(state.selectedColor));
  });
}
function selectColor(c) {
  state.selectedColor = c;
  document.querySelectorAll('#color-row .color-swatch').forEach(el => {
    el.classList.toggle('selected', el.style.background === c || el.style.background === hexToRgb(c));
  });
}
function hexToRgb(hex) { return hex; }
function buildCatPickRow() {
  document.getElementById('cat-color-pick').innerHTML = COLORS.map(c =>
    '<div class="color-swatch ' + (c===state.catPickColor?'selected':'') + '" style="background:' + c + ';width:28px;height:28px;" onclick="selectCatColor(\'' + c + '\')"></div>'
  ).join('');
}
function selectCatColor(c) {
  state.catPickColor = c;
  document.querySelectorAll('#cat-color-pick .color-swatch').forEach(el => {
    el.classList.toggle('selected', el.style.background === c);
  });
}

// ─── TABS ───
function switchTab(tab) {
  state.tab = tab;
  state.catFilter = 'all';
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  render();
}
function setCatFilter(id) { state.catFilter = id; renderCategoryBar(); renderList(); }

// ─── SEARCH ───
function setupSearch() {
  const input = document.getElementById('search');
  input.addEventListener('input', (e) => {
    state.search = e.target.value.trim();

    // Always do immediate substring render
    state.semanticResults = null;
    renderList();

    // Debounce semantic search
    clearTimeout(state.searchTimeout);
    if (state.search && semanticReady) {
      state.searchTimeout = setTimeout(async () => {
        const d = getData();
        const results = await semanticSearch(state.search, d.diagnoses);
        if (results && state.search === e.target.value.trim() && !state.viewingId) {
          state.semanticResults = results;
          renderList();
        }
      }, 300);
    }
  });
}

// ─── CATEGORY MANAGER ───
function openCatManager() { renderCatManager(); document.getElementById('cat-manager').classList.add('open'); }
function closeCatManager() { document.getElementById('cat-manager').classList.remove('open'); render(); }
function renderCatManager() {
  const d = getData();
  const list = document.getElementById('cat-list');
  if (d.categories.length === 0) {
    list.innerHTML = '<div class="empty-state" style="padding:30px 0"><div class="empty-state-sub">No categories yet.</div></div>';
    return;
  }
  list.innerHTML = d.categories.map(cat =>
    '<div class="cat-item"><div class="cat-item-dot" style="background:' + cat.color + '"></div><div class="cat-item-name">' + escHtml(cat.name) + '</div><button class="cat-delete-btn" onclick="deleteCategory(\'' + cat.id + '\')">✕</button></div>'
  ).join('');
}
function addCategory() {
  const name = document.getElementById('new-cat-name').value.trim();
  if (!name) return;
  const d = getData();
  d.categories.push({ id: uid(), name, color: state.catPickColor });
  saveData(d);
  document.getElementById('new-cat-name').value = '';
  renderCatManager();
}
function deleteCategory(id) {
  if (!confirm('Delete this category? Diagnoses will not be deleted.')) return;
  const d = getData();
  d.categories = d.categories.filter(c => c.id !== id);
  d.diagnoses = d.diagnoses.map(dx => dx.catId === id ? {...dx, catId: ''} : dx);
  saveData(d);
  renderCatManager();
}

// ─── HELPERS ───
function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── SERVICE WORKER ───
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'medref-v3';
const ASSETS = [location.href];
self.addEventListener('install', e => { e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))); });
self.addEventListener('activate', e => { e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k))))); });
self.addEventListener('fetch', e => { e.respondWith(fetch(e.request).catch(() => caches.match(e.request))); });
`;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}

</script>
