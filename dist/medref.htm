<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MedRef">
<meta name="theme-color" content="#0f172a">
<title>MedRef</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #273449;
    --border: #334155;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent1: #f97316;
    --accent2: #06b6d4;
    --accent3: #a855f7;
    --accent4: #22c55e;
    --accent5: #f43f5e;
    --accent6: #eab308;
    --radius: 16px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; overflow-x: hidden; }
  #app { display: flex; flex-direction: column; height: 100dvh; }
  #header { background: var(--bg); padding: calc(var(--safe-top) + 12px) 16px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; position: sticky; top: 0; z-index: 50; }
  #header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  #logo { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: -1px; }
  #logo span:nth-child(1) { color: var(--accent2); }
  #logo span:nth-child(2) { color: var(--text); }
  #logo span:nth-child(3) { color: var(--accent1); }
  #add-btn { background: var(--accent1); color: #fff; border: none; border-radius: 50px; padding: 8px 18px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  #add-btn:active { opacity: 0.8; transform: scale(0.97); }
  #search-wrap { position: relative; }
  #search { width: 100%; background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 11px 14px 11px 40px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; outline: none; transition: border-color 0.2s; }
  #search:focus { border-color: var(--accent2); }
  #search::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  #ai-badge { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 50px; pointer-events: none; transition: all 0.3s; }
  #ai-badge.loading { background: var(--accent6); color: var(--bg); }
  #ai-badge.ready { background: var(--accent4); color: var(--bg); }
  #ai-badge.off { display: none; }
  #tabs { display: flex; padding: 10px 16px 0; gap: 8px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; background: var(--bg); border-bottom: 1px solid var(--border); }
  #tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 8px 16px; border-radius: 10px 10px 0 0; border: none; background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; border-bottom: 3px solid transparent; padding-bottom: 10px; }
  .tab.active { color: var(--text); border-bottom-color: var(--accent2); }
  .tab:active { opacity: 0.7; }
  #main { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: calc(var(--safe-bottom) + 80px); }
  #category-bar { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; margin-bottom: 16px; padding-bottom: 4px; }
  #category-bar::-webkit-scrollbar { display: none; }
  .cat-pill { padding: 6px 14px; border-radius: 50px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .cat-pill.active, .cat-pill:active { color: #fff; }
  .section-letter { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800; color: var(--accent2); letter-spacing: 2px; text-transform: uppercase; padding: 8px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 10px; margin-top: 6px; }
  .dx-card { background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border); margin-bottom: 10px; cursor: pointer; transition: transform 0.15s, border-color 0.15s; overflow: hidden; }
  .dx-card:active { transform: scale(0.98); }
  .dx-card-header { display: flex; align-items: center; gap: 12px; padding: 14px; }
  .dx-color-bar { width: 4px; height: 44px; border-radius: 4px; flex-shrink: 0; }
  .dx-card-info { flex: 1; min-width: 0; }
  .dx-name { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dx-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .dx-icd { font-size: 11px; font-weight: 600; color: var(--muted); background: var(--surface2); padding: 2px 8px; border-radius: 50px; font-family: 'DM Sans', monospace; }
  .dx-cat-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 50px; color: #fff; }
  .dx-card-chevron { color: var(--muted); font-size: 18px; }
  .dx-score { font-size: 10px; color: var(--accent4); font-weight: 600; margin-left: auto; padding: 2px 6px; background: rgba(34,197,94,0.15); border-radius: 50px; }
  #detail-view { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; }
  #detail-view.open { display: flex; }
  #detail-header { padding: calc(var(--safe-top) + 12px) 16px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #detail-back { background: none; border: none; color: var(--accent2); font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
  #detail-title-bar { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  #detail-name { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; line-height: 1.2; flex: 1; }
  #detail-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .icon-btn { background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); font-size: 17px; }
  .icon-btn:active { opacity: 0.7; }
  .icon-btn.delete { color: var(--accent5); }
  #detail-body { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: calc(var(--safe-bottom) + 20px); }
  .detail-meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .section-card { background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border); margin-bottom: 14px; overflow: hidden; }
  .section-card-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .section-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .section-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
  .section-content { padding: 14px; color: var(--text); font-size: 15px; line-height: 1.7; white-space: pre-wrap; }
  .section-content ul { list-style: none; }
  .section-content ul li { padding: 4px 0; display: flex; align-items: flex-start; gap: 8px; }
  .section-content ul li::before { content: '\25B8'; color: var(--accent2); flex-shrink: 0; margin-top: 1px; }
  .tag-list { display: flex; flex-wrap: wrap; gap: 8px; padding: 14px; }
  .tag { padding: 6px 12px; border-radius: 50px; font-size: 13px; font-weight: 600; background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
  #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; display: none; align-items: flex-end; }
  #modal-overlay.open { display: flex; }
  #modal { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; max-height: 92dvh; display: flex; flex-direction: column; padding-bottom: var(--safe-bottom); animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  #modal-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #modal-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
  #modal-close { background: var(--surface2); border: none; border-radius: 50%; width: 32px; height: 32px; color: var(--muted); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  #modal-body { flex: 1; overflow-y: auto; padding: 20px; }
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .form-input, .form-textarea, .form-select { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; outline: none; transition: border-color 0.2s; appearance: none; -webkit-appearance: none; }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent2); }
  .form-textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
  .form-hint { font-size: 12px; color: var(--muted); margin-top: 5px; }
  .color-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
  .color-swatch { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: border-color 0.15s, transform 0.15s; }
  .color-swatch.selected { border-color: #fff; transform: scale(1.1); }
  #modal-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; flex-shrink: 0; }
  .btn-primary { flex: 1; background: var(--accent1); color: #fff; border: none; border-radius: 12px; padding: 14px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 16px; cursor: pointer; transition: opacity 0.2s; }
  .btn-primary:active { opacity: 0.8; }
  .btn-cancel { background: var(--surface2); color: var(--muted); border: none; border-radius: 12px; padding: 14px 20px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 16px; cursor: pointer; }
  #cat-manager { position: fixed; inset: 0; background: var(--bg); z-index: 150; display: none; flex-direction: column; }
  #cat-manager.open { display: flex; }
  #cat-manager-header { padding: calc(var(--safe-top) + 12px) 16px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  #cat-manager-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
  #cat-manager-body { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: calc(var(--safe-bottom) + 20px); }
  .cat-item { display: flex; align-items: center; gap: 12px; background: var(--surface); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; border: 1.5px solid var(--border); }
  .cat-item-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .cat-item-name { flex: 1; font-weight: 600; font-size: 16px; }
  .cat-delete-btn { background: none; border: none; color: var(--accent5); font-size: 20px; cursor: pointer; padding: 4px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .empty-state-sub { font-size: 15px; line-height: 1.6; }
  #install-banner { position: fixed; bottom: calc(var(--safe-bottom) + 16px); left: 16px; right: 16px; background: var(--accent2); color: var(--bg); border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 10px; z-index: 300; box-shadow: 0 8px 32px rgba(6,182,212,0.4); animation: fadeInUp 0.4s ease; }
  @keyframes fadeInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  #install-banner.hidden { display: none; }
  #install-banner-text { flex: 1; font-size: 13px; font-weight: 600; line-height: 1.4; }
  #install-dismiss { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--bg); padding: 4px; }
  .count-badge { background: var(--surface2); color: var(--muted); font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 50px; margin-left: 4px; }
</style>
</head>
<body>
<div id="install-banner">
  <span style="font-size:22px">📲</span>
  <div id="install-banner-text">Tap <strong>Share → Add to Home Screen</strong> to install MedRef as an app!</div>
  <button id="install-dismiss" onclick="dismissBanner()">✕</button>
</div>
<div id="app">
  <div id="header">
    <div id="header-top">
      <div id="logo"><span>Med</span><span>Ref</span><span>+</span></div>
      <button id="add-btn" onclick="openModal()">＋ Add Dx</button>
    </div>
    <div id="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="search" type="search" placeholder="Search diagnoses..." autocomplete="off" autocorrect="off" spellcheck="false">
      <span id="ai-badge" class="off"></span>
    </div>
  </div>
  <div id="tabs">
    <button class="tab active" data-tab="browse" onclick="switchTab('browse')">Browse A–Z</button>
    <button class="tab" data-tab="category" onclick="switchTab('category')">By Category</button>
    <button class="tab" data-tab="recent" onclick="switchTab('recent')">Recent</button>
  </div>
  <div id="main">
    <div id="category-bar"></div>
    <div id="dx-list"></div>
  </div>
</div>
<div id="detail-view">
  <div id="detail-header">
    <button id="detail-back" onclick="closeDetail()">← Back</button>
    <div id="detail-title-bar">
      <div id="detail-name"></div>
      <div id="detail-actions">
        <div class="icon-btn" onclick="editCurrentDx()" title="Edit">✏️</div>
        <div class="icon-btn delete" onclick="deleteCurrentDx()" title="Delete">🗑</div>
      </div>
    </div>
  </div>
  <div id="detail-body"></div>
</div>
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-header">
      <div id="modal-title">New Diagnosis</div>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body">
      <div class="form-group"><label class="form-label">Diagnosis Name *</label><input id="f-name" class="form-input" type="text" placeholder="e.g. Acute Appendicitis"></div>
      <div class="form-group"><label class="form-label">ICD-10 Code</label><input id="f-icd" class="form-input" type="text" placeholder="e.g. K35.89" style="font-family:monospace;font-size:15px;"></div>
      <div class="form-group"><label class="form-label">Category</label><select id="f-cat" class="form-select"></select></div>
      <div class="form-group"><label class="form-label">Color Label</label><div class="color-row" id="color-row"></div></div>
      <div class="form-group"><label class="form-label">Signs & Symptoms</label><textarea id="f-signs" class="form-textarea" placeholder="List signs and symptoms..."></textarea></div>
      <div class="form-group"><label class="form-label">Treatment</label><textarea id="f-treatment" class="form-textarea" placeholder="Treatment protocols..."></textarea></div>
      <div class="form-group"><label class="form-label">Medications / Dosing</label><textarea id="f-meds" class="form-textarea" placeholder="Drug names, doses..."></textarea></div>
      <div class="form-group"><label class="form-label">Differential Diagnoses</label><input id="f-ddx" class="form-input" type="text" placeholder="Comma separated..."></div>
      <div class="form-group"><label class="form-label">Lab / Imaging Findings</label><textarea id="f-labs" class="form-textarea" placeholder="Key labs, imaging..."></textarea></div>
      <div class="form-group"><label class="form-label">Clinical Pearls / Notes</label><textarea id="f-notes" class="form-textarea" placeholder="Teaching points..."></textarea></div>
    </div>
    <div id="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveDx()">Save Diagnosis</button>
    </div>
  </div>
</div>
<div id="cat-manager">
  <div id="cat-manager-header">
    <div id="cat-manager-title">Manage Categories</div>
    <button class="icon-btn" onclick="closeCatManager()">✕</button>
  </div>
  <div id="cat-manager-body">
    <div class="form-group" style="display:flex;gap:10px;">
      <input id="new-cat-name" class="form-input" type="text" placeholder="New category name..." style="flex:1">
      <div id="cat-color-pick" style="display:flex;gap:6px;align-items:center;"></div>
    </div>
    <button class="btn-primary" onclick="addCategory()" style="width:100%;margin-bottom:20px;">Add Category</button>
    <div id="cat-list"></div>
  </div>
</div>
<script>

// ─── BUILT-IN DATA ───
const BUILTIN_DIAGNOSES = [{"id":"dx1","name":"Acute Myocardial Infarction","icd":"I21.9","catId":"c1","color":"#f43f5e","signs":"Chest pain (crushing, pressure-like)\nRadiation to left arm, jaw, back\nDiaphoresis\nNausea/vomiting\nDyspnea\nFatigue\nSyncope","treatment":"1. Activate cath lab (STEMI) - Door-to-balloon <90 min\n2. Aspirin 325mg PO STAT\n3. P2Y12 inhibitor (ticagrelor 180mg or clopidogrel 600mg)\n4. Anticoagulation: heparin or bivalirudin\n5. Oxygen if SpO2 <90%\n6. Nitrates (unless hypotensive or RV infarct)\n7. Beta-blocker if hemodynamically stable","meds":"Aspirin 325mg PO x1 then 81mg daily\nTicagrelor 180mg load then 90mg BID\nMetoprolol 25-50mg PO BID\nLisinopril 2.5-10mg PO daily\nAtorvastatin 80mg PO daily\nHeparin 60u/kg IV bolus (max 4000u)","ddx":"NSTEMI, Unstable Angina, Aortic Dissection, PE, Pericarditis, GERD, Musculoskeletal pain","labs":"Troponin I/T (serial q3-6h)\n12-lead ECG immediately\nCBC, BMP, coags\nCXR\nEcho\nLipid panel","notes":"STEMI: ST elevation >=1mm in >=2 contiguous leads or new LBBB\nRight-sided leads (V3R/V4R) for RV infarct - AVOID nitrates\nInferior MI: check for AV block\nFemales/diabetics: atypical presentation common","created":1772760297083,"builtIn":true},{"id":"dx2","name":"Congestive Heart Failure","icd":"I50.9","catId":"c1","color":"#f43f5e","signs":"Dyspnea on exertion\nOrthopnea\nParoxysmal nocturnal dyspnea\nPeripheral edema\nJVD\nS3 gallop\nPulmonary crackles\nWeight gain\nFatigue","treatment":"1. Oxygen if hypoxic\n2. IV furosemide for acute decompensation\n3. Vasodilators (nitroglycerin) if hypertensive\n4. ACEi/ARB or ARNI for HFrEF\n5. Beta-blocker (carvedilol, metoprolol succinate, bisoprolol)\n6. Aldosterone antagonist if EF<=35%\n7. SGLT2 inhibitor\n8. Sodium/fluid restriction","meds":"Furosemide 20-80mg IV/PO\nLisinopril 2.5-40mg daily\nSacubitril/valsartan 24/26mg to 97/103mg BID\nCarvedilol 3.125-25mg BID\nSpironolactone 12.5-50mg daily\nDapagliflozin 10mg daily","ddx":"Pneumonia, COPD exacerbation, PE, Nephrotic syndrome, Cirrhosis, Pericardial effusion","labs":"BNP or NT-proBNP\nCXR (cardiomegaly, pulmonary edema)\nEcho (EF, wall motion)\nBMP (renal function, electrolytes)\nCBC\nTSH\nIron studies","notes":"HFrEF: EF<=40%, HFmrEF: 41-49%, HFpEF: >=50%\nGDAT: ACEi/ARB/ARNI + BB + MRA + SGLT2i for HFrEF\nDaily weights - report 2lb/day or 5lb/week gain\nAvoid NSAIDs, CCBs (except amlodipine) in HFrEF","created":1772760296083,"builtIn":true},{"id":"dx3","name":"Atrial Fibrillation","icd":"I48.91","catId":"c1","color":"#f43f5e","signs":"Palpitations\nIrregularly irregular pulse\nDyspnea\nFatigue\nDizziness/lightheadedness\nChest discomfort\nExercise intolerance\nSyncope (rare)","treatment":"1. Rate control: target HR <110 (or <80 if symptomatic)\n2. Rhythm control if symptomatic or new-onset\n3. Anticoagulation based on CHA2DS2-VASc score\n4. Cardioversion if hemodynamically unstable\n5. Catheter ablation for refractory cases","meds":"Metoprolol 25-100mg BID (rate control)\nDiltiazem 30-90mg TID or 120-360mg ER daily\nAmiodarone 200mg daily (rhythm)\nFlecainide 50-150mg BID (rhythm, no structural heart dz)\nApixaban 5mg BID\nRivaroxaban 20mg daily with food","ddx":"Atrial flutter, SVT, MAT, Sinus tachycardia with PACs, Hyperthyroidism","labs":"ECG (absent P waves, irregular RR)\nTSH\nBMP\nCBC\nEcho\nLFTs if starting amiodarone\nPT/INR if on warfarin","notes":"CHA2DS2-VASc: CHF, HTN, Age>=75(2), DM, Stroke/TIA(2), Vasc dz, Age 65-74, Sex(female)\nScore >=2 men or >=3 women: anticoagulate\n48h rule: if AF >48h, anticoagulate 3wk before cardioversion or TEE to r/o thrombus\nHAS-BLED score for bleeding risk","created":1772760295083,"builtIn":true},{"id":"dx4","name":"Aortic Dissection","icd":"I71.00","catId":"c1","color":"#f43f5e","signs":"Sudden severe tearing/ripping chest pain\nRadiation to back (interscapular)\nPulse deficit between arms\nBP differential >20mmHg between arms\nAortic regurgitation murmur\nSyncope\nStroke symptoms if arch involved","treatment":"1. Type A (ascending): emergent surgical repair\n2. Type B (descending): medical management unless complicated\n3. IV esmolol or labetalol - target HR <60, SBP 100-120\n4. IV nitroprusside after beta-blockade if needed\n5. Pain control with IV morphine\n6. Avoid anticoagulation until dissection ruled out","meds":"Esmolol 500mcg/kg bolus then 50-200mcg/kg/min\nLabetalol 20mg IV q10min (max 300mg)\nNitroprusside 0.25-10mcg/kg/min (after BB)\nMorphine 2-4mg IV q5-15min PRN","ddx":"MI, PE, Tension pneumothorax, Pericardial tamponade, Esophageal rupture, Mediastinitis","labs":"CT angiography (gold standard)\nCXR (widened mediastinum)\nTEE if unstable\nD-dimer (sensitive but nonspecific)\nBMP, CBC, type and screen\nTroponin (may elevate if coronary involvement)","notes":"Stanford A: involves ascending aorta - SURGICAL EMERGENCY\nStanford B: descending only - usually medical\nRisk factors: HTN, Marfan, bicuspid aortic valve, cocaine\nDo NOT delay imaging for labs","created":1772760294083,"builtIn":true},{"id":"dx5","name":"Hypertensive Emergency","icd":"I16.1","catId":"c1","color":"#f43f5e","signs":"SBP >180 and/or DBP >120 with end-organ damage\nHeadache\nVisual changes\nChest pain\nDyspnea\nAltered mental status\nNausea/vomiting\nFocal neurologic deficits\nPapilledema","treatment":"1. IV antihypertensives (NOT oral for true emergency)\n2. Reduce MAP by 10-20% in first hour\n3. Then to 160/100 over next 2-6h\n4. Identify and treat underlying cause\n5. Avoid rapid or excessive BP reduction\n6. Specific agents based on end-organ involvement","meds":"Nicardipine 5-15mg/h IV (most versatile)\nLabetalol 20mg IV bolus then 1-2mg/min\nNitroprusside 0.25-10mcg/kg/min (if no ICP concerns)\nClevidipine 1-2mg/h IV\nEnalaprilat 1.25mg IV q6h\nFenoldopam 0.1-1.6mcg/kg/min (renal protective)","ddx":"Hypertensive urgency (no end-organ damage), Stroke, Pheochromocytoma, Pre-eclampsia, Aortic dissection, Sympathomimetic toxicity","labs":"BMP (creatinine, electrolytes)\nUrinalysis (proteinuria, hematuria)\nCBC with smear (MAHA)\nLDH, haptoglobin\nTroponin\nCT head if neuro symptoms\nCXR\nFundoscopy","notes":"Emergency = end-organ damage; Urgency = severely elevated BP without damage\nEnd organs: brain, heart, kidneys, eyes, aorta\nException: ischemic stroke - permissive HTN unless >220/120 or getting tPA\nAortic dissection: target SBP 100-120 with beta-blocker first","created":1772760293083,"builtIn":true},{"id":"dx6","name":"Pericarditis","icd":"I30.9","catId":"c1","color":"#f43f5e","signs":"Sharp pleuritic chest pain\nImproved by sitting up and leaning forward\nWorsened by lying supine or deep breathing\nPericardial friction rub\nLow-grade fever\nDyspnea\nDiffuse ST elevation","treatment":"1. NSAIDs (ibuprofen or aspirin) as first-line\n2. Colchicine for 3 months to prevent recurrence\n3. Restrict exercise until symptoms resolve and markers normalize\n4. Corticosteroids only if NSAID-refractory and not infectious\n5. Pericardiocentesis if tamponade","meds":"Ibuprofen 600mg TID x1-2 weeks\nAspirin 750-1000mg TID x1-2 weeks\nColchicine 0.5mg BID (0.5mg daily if <70kg)\nPreднизолone 0.25-0.5mg/kg if refractory\nPPI for GI protection with NSAIDs","ddx":"MI, PE, Aortic dissection, Myocarditis, Pleuritis, Costochondritis, GERD","labs":"ECG (diffuse ST elevation, PR depression)\nTroponin (may elevate = myopericarditis)\nCRP/ESR\nCBC\nBMP\nEcho (pericardial effusion?)\nCXR\nBlood cultures if febrile","notes":"Diagnosis: 2 of 4 - chest pain, friction rub, ECG changes, new/worsening pericardial effusion\nViral most common cause (often idiopathic)\nAvoid anticoagulation (risk of hemorrhagic pericarditis)\nRecurrence rate 30% - colchicine reduces this","created":1772760292083,"builtIn":true},{"id":"dx7","name":"Pulmonary Embolism","icd":"I26.99","catId":"c1","color":"#f43f5e","signs":"Sudden dyspnea\nPleuritic chest pain\nTachycardia\nTachypnea\nHemoptysis\nLeg swelling (DVT)\nHypotension (massive PE)\nSyncope\nHypoxia","treatment":"1. Anticoagulation immediately if high clinical suspicion\n2. Submassive: anticoagulation +/- thrombolytics\n3. Massive (hemodynamic instability): systemic thrombolysis\n4. Surgical embolectomy or catheter-directed therapy if thrombolysis contraindicated\n5. IVC filter if anticoagulation contraindicated","meds":"Heparin 80u/kg bolus then 18u/kg/h\nEnoxaparin 1mg/kg SC BID\nApixaban 10mg BID x7d then 5mg BID\nRivaroxaban 15mg BID x21d then 20mg daily\nAlteplase 100mg IV over 2h (massive PE)","ddx":"MI, Pneumonia, Pneumothorax, Aortic dissection, Pericarditis, Anxiety/panic, Pleuritis","labs":"CT pulmonary angiography (gold standard)\nD-dimer (to rule out if low pretest probability)\nECG (sinus tach, S1Q3T3, RBBB, RV strain)\nTroponin, BNP (risk stratification)\nABG\nLower extremity duplex US\nEcho (RV dilation)","notes":"Wells criteria for pretest probability\nNegative D-dimer with low Wells rules out PE\nMassive = hypotension; Submassive = RV dysfunction without hypotension\nAnticoagulate 3mo minimum; longer if unprovoked or recurrent\nHeparin does NOT dissolve clot - prevents extension","created":1772760291083,"builtIn":true},{"id":"dx8","name":"Deep Vein Thrombosis","icd":"I82.40","catId":"c1","color":"#f43f5e","signs":"Unilateral leg swelling\nPain/tenderness along deep veins\nWarmth\nErythema\nHoman sign (unreliable)\nPitting edema\nDistension of superficial veins\nLow-grade fever","treatment":"1. Anticoagulation for minimum 3 months\n2. DOAC preferred over warfarin for most patients\n3. Compression stockings for symptom relief\n4. Catheter-directed thrombolysis for massive iliofemoral DVT\n5. IVC filter if anticoagulation contraindicated\n6. Early ambulation","meds":"Apixaban 10mg BID x7d then 5mg BID\nRivaroxaban 15mg BID x21d then 20mg daily\nEnoxaparin 1mg/kg SC BID (bridge to warfarin)\nWarfarin target INR 2-3\nHeparin 80u/kg bolus then 18u/kg/h","ddx":"Cellulitis, Baker cyst rupture, Superficial thrombophlebitis, Lymphedema, Muscle strain, Chronic venous insufficiency, Compartment syndrome","labs":"Compression ultrasonography (gold standard)\nD-dimer (rule out if low pretest)\nCBC, BMP, PT/INR\nConsider thrombophilia workup if unprovoked/recurrent\nCT venography if US inconclusive","notes":"Wells score for pretest probability\nProximal DVT (above knee) has higher PE risk than distal\nProvoked (surgery, immobilization, cancer) vs unprovoked\nCancer screening recommended for unprovoked DVT in age >40\nMay-Thurner syndrome: left iliac vein compression","created":1772760290083,"builtIn":true},{"id":"dx9","name":"Infective Endocarditis","icd":"I33.0","catId":"c1","color":"#f43f5e","signs":"Fever (most common)\nNew or changing heart murmur\nOsler nodes (painful, fingers/toes)\nJaneway lesions (painless, palms/soles)\nSplinter hemorrhages\nRoth spots (retinal)\nSplenomegaly\nPetechiae\nEmbolic events (stroke, septic emboli)","treatment":"1. Empiric antibiotics after 3 sets blood cultures\n2. Native valve: vancomycin + ceftriaxone empirically\n3. Prosthetic valve: vancomycin + gentamicin + rifampin\n4. Surgical intervention for heart failure, uncontrolled infection, large vegetations, embolic events\n5. 4-6 weeks IV antibiotics typically","meds":"Vancomycin 15-20mg/kg IV q8-12h\nCeftriaxone 2g IV q24h\nNafcillin 2g IV q4h (MSSA)\nGentamicin 1mg/kg IV q8h\nRifampin 300mg PO q8h (prosthetic valve)","ddx":"Rheumatic fever, SLE (Libman-Sacks), Atrial myxoma, Marantic endocarditis, Bacteremia without endocarditis","labs":"Blood cultures x3 (different sites, different times)\nTTE then TEE if TTE negative but high suspicion\nCBC (anemia, leukocytosis)\nESR/CRP elevated\nUrinalysis (hematuria)\nRheumatoid factor\nComplement levels","notes":"Modified Duke criteria: 2 major, 1 major + 3 minor, or 5 minor\nMajor: positive blood cultures (typical organisms), endocardial involvement on echo\nMinor: predisposition, fever, vascular/immunologic phenomena, suggestive micro\nIVDU: right-sided (tricuspid) most common\nS. aureus most common overall; Strep viridans in native valve","created":1772760289083,"builtIn":true},{"id":"dx10","name":"Community-Acquired Pneumonia","icd":"J18.9","catId":"c2","color":"#06b6d4","signs":"Fever/chills\nProductive cough\nDyspnea\nPleuritic chest pain\nTachycardia\nTachypnea\nDecreased breath sounds\nDullness to percussion\nEgophony\nTactile fremitus increased","treatment":"1. Risk stratify with CURB-65 or PSI/PORT\n2. Outpatient: amoxicillin or doxycycline; add macrolide if comorbidities\n3. Inpatient non-ICU: beta-lactam + macrolide OR respiratory fluoroquinolone\n4. ICU: beta-lactam + macrolide or fluoroquinolone\n5. Add MRSA/Pseudomonas coverage if risk factors\n6. O2 supplementation if SpO2 <94%","meds":"Amoxicillin 1g PO TID\nAzithromycin 500mg then 250mg daily x4d\nCeftriaxone 1-2g IV daily\nLevofloxacin 750mg PO/IV daily\nVancomycin 15-20mg/kg IV q8-12h (if MRSA)\nPiperacillin-tazobactam 4.5g IV q6h (if Pseudomonas)","ddx":"HCAP, Aspiration pneumonia, PE, CHF exacerbation, Lung abscess, TB, Lung cancer","labs":"CXR\nCBC with differential\nBMP\nBlood cultures x2 before abx\nSputum culture/Gram stain\nUrinary Legionella/Pneumococcal antigen\nProCalcitonin\nABG if severe","notes":"CURB-65: Confusion, Urea >7, RR >=30, BP <90/60, Age >=65\n0-1: outpatient; 2: consider admission; >=3: ICU consideration\nAtypical organisms: Legionella, Mycoplasma, Chlamydophila\nFollow-up CXR in 6-8 weeks for smokers >50yo","created":1772760288083,"builtIn":true},{"id":"dx11","name":"COPD Exacerbation","icd":"J44.1","catId":"c2","color":"#06b6d4","signs":"Increased dyspnea\nIncreased sputum volume/purulence\nWheezing\nAccessory muscle use\nTachypnea\nCyanosis\nDecreased breath sounds\nBarrel chest\nPursed lip breathing\nPeripheral edema (cor pulmonale)","treatment":"1. Bronchodilators (SABA +/- SAMA)\n2. Systemic corticosteroids\n3. Antibiotics if increased sputum purulence\n4. Oxygen target SpO2 88-92%\n5. NIV (BiPAP) if respiratory acidosis\n6. Intubation if failing NIV","meds":"Albuterol 2.5mg nebulized q20min x3 then q4h\nIpratropium 0.5mg nebulized q4-6h\nPrednisone 40mg PO daily x5 days\nAzithromycin 500mg then 250mg x4d\nDoxycycline 100mg BID x5-7d","ddx":"Asthma exacerbation, Pneumonia, PE, CHF, Pneumothorax, Lung cancer","labs":"ABG (hypercapnia, respiratory acidosis)\nCXR (hyperinflation, r/o pneumonia/PTX)\nCBC\nBMP\nSputum culture if purulent\nProCalcitonin\nBNP if CHF suspected","notes":"GOLD criteria for severity\nABCs of COPD exacerbation: Antibiotics, Bronchodilators, Corticosteroids\nAvoid high-flow O2 - may worsen hypercapnia\nBiPAP settings: start IPAP 10, EPAP 5\nEscalate IPAP for ventilation (CO2), EPAP for oxygenation","created":1772760287083,"builtIn":true},{"id":"dx12","name":"Asthma Exacerbation","icd":"J45.901","catId":"c2","color":"#06b6d4","signs":"Wheezing\nDyspnea\nChest tightness\nCough (often worse at night)\nTachypnea\nAccessory muscle use\nDifficulty speaking in full sentences\nPulsus paradoxus >10mmHg\nDecreased air movement (severe)","treatment":"1. Continuous albuterol nebulization\n2. Ipratropium in first hour for severe\n3. Systemic corticosteroids early\n4. Magnesium sulfate IV for severe/life-threatening\n5. Oxygen to target SpO2 93-95%\n6. Intubation for respiratory failure (use ketamine for induction)","meds":"Albuterol 2.5-5mg nebulized q20min x3 or continuous 10-15mg/h\nIpratropium 0.5mg nebulized q20min x3\nMethylprednisolone 125mg IV or Prednisone 40-60mg PO\nMagnesium sulfate 2g IV over 20min\nEpinephrine 0.3mg IM (anaphylaxis/severe)","ddx":"COPD exacerbation, Vocal cord dysfunction, Foreign body, PE, Anaphylaxis, CHF (cardiac asthma)","labs":"Peak flow (PEF <25% predicted = severe)\nSpO2 continuous\nABG if severe\nCXR (r/o pneumothorax, pneumonia)\nBMP\nConsider VBG","notes":"Mild: speaks sentences, PEF >50%\nModerate: speaks phrases, PEF 33-50%\nSevere: speaks words, PEF <33%\nLife-threatening: silent chest, cyanosis, bradycardia, confusion\nSilent chest = critical - means almost no air movement\nAvoid sedation unless intubating","created":1772760286083,"builtIn":true},{"id":"dx13","name":"Pneumothorax","icd":"J93.9","catId":"c2","color":"#06b6d4","signs":"Sudden onset pleuritic chest pain\nDyspnea\nDecreased breath sounds on affected side\nHyperresonance to percussion\nTracheal deviation (tension)\nTachycardia\nHypotension (tension)\nSubcutaneous emphysema","treatment":"1. Small primary spontaneous (<2cm): observe, supplemental O2\n2. Large or symptomatic: needle aspiration or chest tube\n3. Tension pneumothorax: immediate needle decompression (2nd ICS MCL) then chest tube\n4. Chest tube: 5th ICS anterior axillary line\n5. Pleurodesis or surgery for recurrence","meds":"Supplemental O2 (accelerates reabsorption)\nAnalgesia: ketorolac 15-30mg IV, morphine 2-4mg IV\nLocal anesthetic for chest tube: lidocaine 1% 10-20mL","ddx":"PE, MI, Pericarditis, Rib fracture, Pleuritis, Aortic dissection, Esophageal rupture","labs":"CXR (visceral pleural line, absent lung markings)\nCT chest (if CXR equivocal)\nABG if respiratory distress\nPoint-of-care ultrasound (absent lung sliding)","notes":"Tension PTX is a CLINICAL diagnosis - do NOT delay for imaging\nPrimary: no underlying lung disease, tall thin males\nSecondary: underlying COPD, CF, etc - higher risk\nIatrogenic: post-central line, post-biopsy, post-mechanical ventilation\nReabsorption rate: ~1.25% per day on room air, faster with O2","created":1772760285083,"builtIn":true},{"id":"dx14","name":"Acute Respiratory Distress Syndrome","icd":"J80","catId":"c2","color":"#06b6d4","signs":"Acute onset dyspnea\nHypoxemia refractory to O2\nBilateral pulmonary infiltrates\nTachypnea\nTachycardia\nAccessory muscle use\nCyanosis\nDecreased lung compliance","treatment":"1. Treat underlying cause\n2. Lung-protective ventilation: Vt 6mL/kg IBW\n3. Plateau pressure <30 cmH2O\n4. PEEP titration (ARDSNet table)\n5. Prone positioning if P/F <150\n6. Conservative fluid strategy\n7. Neuromuscular blockade in severe (first 48h)","meds":"Cisatracurium 15mg bolus then 37.5mg/h (paralysis)\nFentanyl 25-100mcg/h + Propofol 5-50mcg/kg/min (sedation)\nFurosemide for conservative fluid management\nTreat underlying cause (antibiotics for sepsis, etc)","ddx":"Cardiogenic pulmonary edema, Diffuse alveolar hemorrhage, Acute eosinophilic pneumonia, Pulmonary vasculitis","labs":"ABG (P/F ratio)\nCXR/CT (bilateral opacities)\nEcho (r/o cardiogenic edema)\nBNP\nCBC, BMP, lactate\nBlood cultures, sputum cultures","notes":"Berlin criteria: acute onset, bilateral opacities, not fully explained by cardiac failure\nMild: P/F 200-300, Moderate: 100-200, Severe: <100\nP/F = PaO2/FiO2\nMortality 30-40% overall\nProne positioning 16h/day reduces mortality in severe","created":1772760284083,"builtIn":true},{"id":"dx15","name":"Ischemic Stroke","icd":"I63.9","catId":"c3","color":"#a855f7","signs":"Sudden focal neurologic deficit\nFacial droop\nArm/leg weakness (contralateral)\nSpeech difficulty (aphasia/dysarthria)\nVision loss\nAtaxia\nVertigo\nSevere headache (less common than hemorrhagic)","treatment":"1. CT head STAT to rule out hemorrhage\n2. IV alteplase if within 4.5h of symptom onset\n3. Mechanical thrombectomy if LVO within 24h (with imaging selection)\n4. Aspirin 325mg within 24-48h (not within 24h of tPA)\n5. Permissive HTN (allow up to 220/120 unless tPA given)\n6. Admit to stroke unit\n7. DVT prophylaxis","meds":"Alteplase 0.9mg/kg IV (max 90mg): 10% bolus, 90% over 60min\nAspirin 325mg PO/PR\nLabetalol 10-20mg IV (if BP >185/110 for tPA)\nNicardipine 5mg/h IV titrate\nHeparin for DVT prophylaxis after 24h","ddx":"Hemorrhagic stroke, TIA, Todd paralysis (postictal), Hypoglycemia, Migraine with aura, Brain tumor, Conversion disorder","labs":"CT head without contrast STAT\nCT angiography (head and neck)\nCT perfusion (for extended window)\nGlucose STAT\nCBC, BMP, PT/INR\nTroponin\nECG\nMRI brain (DWI) when able","notes":"Time is brain: 1.9M neurons lost per minute\ntPA window: 4.5h; Exclusions: recent surgery, bleeding, INR >1.7, platelets <100k\nNIHSS for severity scoring\nLarge vessel occlusion: consider thrombectomy up to 24h with favorable imaging\nSwallow screen before any PO","created":1772760283083,"builtIn":true},{"id":"dx16","name":"Hemorrhagic Stroke","icd":"I61.9","catId":"c3","color":"#a855f7","signs":"Sudden severe headache (worst of life)\nFocal neurologic deficits\nAltered mental status\nNausea/vomiting\nSeizures\nNuchal rigidity (if SAH)\nHTN\nPupil abnormalities\nDecorticate/decerebrate posturing (severe)","treatment":"1. CT head STAT\n2. Reverse anticoagulation immediately\n3. BP management: target SBP <140 for ICH\n4. Seizure prophylaxis controversial\n5. ICP management: HOB 30 degrees, mannitol or hypertonic saline\n6. Neurosurgical consultation\n7. EVD if hydrocephalus\n8. SAH: secure aneurysm (coiling or clipping)","meds":"Nicardipine 5-15mg/h IV (BP control)\nLabetalol 10-20mg IV bolus\n4-factor PCC for warfarin reversal\nIdarucizumab for dabigatran reversal\nAndexanet alfa for factor Xa inhibitor reversal\nMannitol 20% 1-1.5g/kg IV\nHypertonic saline 23.4% 30mL via central line\nNimodipine 60mg PO q4h (SAH vasospasm prevention)","ddx":"Ischemic stroke, Subdural/epidural hematoma, Brain tumor with hemorrhage, Hypertensive encephalopathy","labs":"CT head without contrast\nCTA (aneurysm, AVM)\nCBC, BMP, coags (PT/INR, PTT)\nType and screen\nLumbar puncture if SAH suspected but CT negative\nMRI/MRA when stable","notes":"ICH: most common cause is HTN (basal ganglia, thalamus, pons, cerebellum)\nSAH: thunderclap headache, Hunt-Hess and Fisher grading\nSAH complications: rebleeding, vasospasm (days 4-14), hydrocephalus\nGCS and ICH score for prognosis\nAvoid hyperthermia, hyperglycemia, hyponatremia","created":1772760282083,"builtIn":true},{"id":"dx17","name":"Bacterial Meningitis","icd":"G00.9","catId":"c3","color":"#a855f7","signs":"Fever\nHeadache\nNuchal rigidity (stiff neck)\nAltered mental status\nPhotophobia\nKernig sign (pain with knee extension when hip flexed)\nBrudzinsk ":"c4","color":"#f97316","signs":"Epigastric pain radiating to back\nNausea/vomiting\nAbdominal tenderness/guarding\nDistension\nFever\nTachycardia\nHypotension (severe)\nCullen sign (periumbilical ecchymosis)\nGrey Turner sign (flank ecchymosis)","treatment":"1. Aggressive IV fluid resuscitation (goal-directed, LR preferred)\n2. Pain management\n3. NPO initially then early oral feeding as tolerated\n4. Treat underlying cause (ERCP for gallstone pancreatitis with cholangitis)\n5. No prophylactic antibiotics for sterile necrosis\n6. ICU for organ failure\n7. Cholecystectomy during same admission for gallstone pancreatitis","meds":"Lactated Ringer 250-500mL/h initially, goal-directed\nHydromorphone 0.5-1mg IV q3h PRN\nKetorolac 15-30mg IV q6h\nOndansetron 4mg IV q6h PRN\nImipenem/meropenem if infected necrosis","ddx":"Peptic ulcer perforation, Cholecystitis, Mesenteric ischemia, SBO, MI (inferior), Aortic dissection, DKA","labs":"Lipase (>3x ULN diagnostic)\nAmylase (less specific)\nCBC, BMP, LFTs, calcium\nTriglycerides\nLactate\nABG if severe\nRUQ US (gallstones)\nCT abdomen with contrast (for complications, not diagnosis)\nMRCP if unclear etiology","notes":"Most common causes: Gallstones (40%), Alcohol (30%) - GET SMASHED mnemonic\nBedside Index of Severity (BISAP), Ranson criteria, APACHE II for prognosis\nSevere: organ failure persisting >48h\nNecrotizing pancreatitis: CT 72h+ after onset\nWalled-off necrosis develops at 4+ weeks\nAvoid morphine (theoretical sphincter of Oddi spasm - debated)","created":1772760277083,"builtIn":true},{"id":"dx22","name":"GI Bleed - Upper","icd":"K92.0","catId":"c4","color":"#f97316","signs":"Hematemesis (bright red or coffee-ground)\nMelena (black tarry stools)\nHematochezia (if massive)\nHypotension/tachycardia\nOrthostatic changes\nAbdominal pain/tenderness\nPallor\nDizziness/syncope","treatment":"1. Two large-bore IVs, aggressive resuscitation\n2. Type and crossmatch, transfuse PRBCs if Hgb <7 (or <9 if CAD)\n3. IV PPI (pantopr ia\nTachypnea\nHypotension (MAP <65)\nAltered mental status\nWarm then cold extremities\nMottled skin\nDecreased urine output\nPetechiae/purpura (DIC)","treatment":"1. Hour-1 Bundle: lactate, blood cultures, broad-spectrum abx, 30mL/kg crystalloid if hypotensive/lactate >=4, vasopressors if persistent hypotension\n2. Source control (drain abscess, remove device)\n3. Reassess volume status\n4. Target MAP >=65\n5. Repeat lactate if initially elevated\n6. Stress-dose steroids if refractory shock","meds":"Norepinephrine first-line vasopressor 0.1-2mcg/kg/min\nVasopressin 0.04 units/min (second agent)\nPiperacillin-tazobactam 4.5g IV q6h OR Meropenem 1g IV q8h\nVancomycin 25-30mg/kg IV loading\nHydrocortisone 50mg IV q6h (refractory shock)\nLactated Ringer 30mL/kg bolus","ddx":"Cardiogenic shock, Hypovolemic shock, Anaphylaxis, Adrenal crisis, Neurogenic shock, Toxic shock syndrome","labs":"Blood cultures x2 (before abx)\nLactate\nCBC with diff\nBMP, LFTs\nCoags (DIC panel)\nProCalcitonin\nUrinalysis + culture\nCXR\nSource-specific imaging\nABG/VBG","notes":"Sepsis-3: suspected infection + SOFA score increase >=2\nqSOFA (screening): RR >=22, AMS, SBP <=100\nSeptic shock: sepsis + vasopressors needed for MAP >=65 + lactate >2 despite adequate fluids\nEach hour delay in antibiotics increases mortality ~4%\nDynamic measures (pulse pressure variation, passive leg raise) better than CVP for fluid responsiveness","created":1772760272083,"builtIn":true},{"id":"dx27","name":"Cellulitis","icd":"L03.90","catId":"c5","color":"#22c55e","signs":"Erythema (spreading, poorly demarcated)\nWarmth\nSwelling/edema\nTenderness/pain\nFever\nLymphadenopathy\nLymphangitis (red streaking)\nSystemic symptoms if severe","treatment":"1. Mild (outpatient): oral antibiotics 5-7 days\n2. Moderate-severe (IV): parenteral antibiotics\n3. Elevate affected extremity\n4. Mark borders with pen to track progression\n5. Incision and drainage if abscess\n6. MRSA coverage if: purulent, abscess, IVDU, prior MRSA, failure of beta-lactam","meds":"Non-purulent: Cephalexin 500mg PO QID or Dicloxacillin 500mg PO QID\nPurulent/MRSA risk: TMP-SMX DS BID or Doxycycline 100mg BID\nSevere: Vancomycin 15-20mg/kg IV q8-12h + Piperacillin-tazobactam 3.375g IV q6h\nI&D for abscess (antibiotics may not be needed if small, uncomplicated abscess)","ddx":"DVT, Erysipelas, Necrotizing fasciitis, Stasis dermatitis, Contact dermatitis, Gout, Insect bite reaction","labs":"Usually clinical diagnosis\nBlood cultures if systemic toxicity\nCBC, BMP, CRP\nUS to evaluate for abscess\nWound culture if draining/abscess\nConsider MRI/CT if necrotizing fasciitis suspected","notes":"Most common cause: Group A Strep (GAS) and S. aureus\nErysipelas: more superficial, well-demarcated, raised borders\nNecrotizing fasciitis red flags: pain out of proportion, crepitus, rapid spread, gray/dusky skin, bullae, systemic toxicity\nRecurrent cellulitis: consider prophylactic penicillin VK 250mg BID","created":1772760271083,"builtIn":true},{"id":"dx28","name":"Urinary Tract Infection / Pyelonephritis","icd":"N39.0","catId":"c5","color":"#22c55e","signs":"Dysuria\nFrequency\nUrgency\nSuprapubic pain/pressure\nHematuria\nCloudy/foul-smelling urine\nPyelonephritis adds: Flank pain, CVA tenderness, Fever/chills, Nausea/vomiting, Systemic illness","treatment":"1. Uncomplicated cystitis: short-course antibiotics\n2. Complicated UTI/pyelonephritis: longer course, consider IV\n3. Admit if: sepsis, unable to tolerate PO, pregnancy, obstruction\n4. Remove/replace urinary catheter if present\n5. Hydration","meds":"Cystitis: Nitrofurantoin 100mg BID x5d or TMP-SMX DS BID x3d\nPyelonephritis (outpatient): Ciprofloxacin 500mg BID x7d or TMP-SMX DS BID x14d\nPyelonephritis (inpatient): Ceftriaxone 1g IV daily or Ciprofloxacin 400mg IV q12h\nPregnancy: Cephalexin 500mg QID x7d or Nitrofurantoin 100mg BID x7d (avoid at term)","ddx":"Vaginitis, STI (urethritis), Interstitial cystitis, Nephrolithiasis, Prostatitis, Bladder cancer","labs":"Urinalysis (pyuria, bacteriuria, nitrites, leukocyte esterase)\nUrine culture (>100k CFU/mL significant)\nCBC, BMP if systemic\nBlood cultures if sepsis/pyelonephritis\nCT abdomen/pelvis if concerned for obstruction or abscess\nRenal US in pregnancy","notes":"Most common: E. coli (80% of uncomplicated UTIs)\nComplicated: male, pregnant, catheter, structural abnormality, immunocompromised\nAsymptomatic bacteriuria: only treat in pregnancy or pre-urologic procedure\nRecurrent UTI (>=3/year): consider prophylaxis, cranberry (weak evidence), post-coital prophylaxis\nFluoroquinolone-sparing approach preferred by FDA","created":1772760270083,"builtIn":true},{"id":"dx29","name":"HIV / AIDS","icd":"B20","catId":"c5","color":"#22c55e","signs":"Acute retroviral syndrome (2-4wk post-exposure): fever, pharyngitis, rash, lymphadenopathy, myalgias\nChronic: weight loss, oral candidiasis, hairy leukoplakia, generalized lymphadenopathy\nAIDS: opportunistic infections, Kaposi sarcoma, wasting, dementia, CD4 <200","treatment":"1. Start ART immediately (same day if possible)\n2. ART for all patients regardless of CD4\n3. Preferred initial regimen: integrase inhibitor-based\n4. OI prophylaxis based on CD4 count\n5. Monitor viral load and CD4\n6. Screen and treat coinfections (Hep B/C, TB, STIs)\n7. PrEP/PEP for exposure prevention","meds":"Biktarvy (bictegravir/emtricitabine/TAF) 1 tab daily\nDolutegravir 50mg + Descovy (TAF/emtricitabine)\nOI prophylaxis:\nCD4 <200: TMP-SMX DS daily (PCP)\nCD4 <100: Azithromycin 1200mg weekly (MAC)\nCD4 <50: consider MAC prophylaxis\nPEP: Truvada + Dolutegravir x28 days","ddx":"Mononucleosis, Acute hepatitis, Secondary syphilis, Drug reaction, SLE, Lymphoma","labs":"HIV-1/2 Ag/Ab combo (4th gen screening)\nHIV RNA viral load (confirmatory and monitoring)\nCD4 count and percentage\nResistance testing (genotype before starting ART)\nCBC, CMP, lipids, A1c\nHep A/B/C, Syphilis RPR, TB (QuantiFERON)\nToxoplasma IgG, CMV IgG","notes":"AIDS: CD4 <200 or ame":"Hyperosmolar Hyperglycemic State","icd":"E11.00","catId":"c6","color":"#eab308","signs":"Profound dehydration\nAltered mental status/coma\nExtreme hyperglycemia (>600)\nPolyuria/polydipsia\nWeakness\nVisual changes\nSeizures\nFocal neurologic deficits\nTachycardia\nHypotension","treatment":"1. Aggressive IV fluids (NS or 1/2NS depending on Na)\n2. Fluid deficit typically 8-10L - replace 50% in first 12h\n3. IV insulin (lower rate than DKA: 0.05-0.1 units/kg/h)\n4. Potassium replacement\n5. Monitor glucose q1h, BMP q2-4h\n6. Treat precipitating cause\n7. VTE prophylaxis (high risk)","meds":"NS 1-1.5L first hour then adjust by corrected Na\nRegular insulin 0.05-0.1 units/kg/h IV\nKCl 20-40mEq/L as needed\nEnoxaparin 40mg SC daily (DVT prophylaxis)","ddx":"DKA, Stroke, Sepsis, Drug overdose, Uremia","labs":"Glucose (often >600, can be >1000)\nSerum osmolality >320 (calculated: 2Na + Gluc/18 + BUN/2.8)\nBMP\nCBC\nCalculated corrected sodium\nUrinalysis\nBlood cultures\nCXR\nNo significant ketosis (bicarb >18, pH >7.3)","notes":"More common in T2DM, elderly, nursing home patients\nMortality higher than DKA (10-20% vs 1-5%)\nPrecipitants: infection, MI, stroke, non-compliance, new diagnosis\nAvoid rapid glucose correction (risk of cerebral edema)\nDo not use 1/2NS initially if corrected Na is low\nFocal deficits may mimic stroke - resolve with treatment","created":1772760267083,"builtIn":true},{"id":"dx32","name":"Thyroid Storm","icd":"E05.91","catId":"c6","color":"#eab308","signs":"High fever (>104F)\nSevere tachycardia/atrial fibrillation\nAgitation/psychosis/delirium\nDiaphoresis\nNausea/vomiting/diarrhea\nHeart failure\nTremor\nSeizures\nJaundice\nComa","treatment":"1. PTU (blocks synthesis AND peripheral conversion)\n2. Beta-blocker (propranolol preferred - also blocks T4->T3)\n3. Iodine (1 hour AFTER PTU to avoid Wolff-Chaikoff escape)\n4. Hydrocortisone (blocks T4->T3 conversion, treats adrenal insufficiency)\n5. Cooling measures (avoid aspirin - displaces T4 from binding proteins)\n6. Treat precipitant\n7. ICU admission","meds":"PTU 200mg PO/PR q4h (then switch to methimazole after crisis)\nPropranolol 60-80mg PO q4h or Esmolol 500mcg/kg bolus then 50-200mcg/kg/min\nSaturated solution of potassium iodide (SSKI) 5 drops q6h (1hr after PTU)\nHydrocortisone 100mg IV q8h\nAcetaminophen for fever (NOT aspirin)","ddx":"Sepsis, Neuroleptic malignant syndrome, Malignant hyperthermia, Sympathomimetic toxicity, Pheochromocytoma, Serotonin syndrome","labs":"TSH (suppressed/undetectable)\nFree T4 (markedly elevated)\nFree T3 (elevated)\nCBC, BMP, LFTs (often abnormal)\nCalcium\nCortisol\nBlood cultures (r/o infection)\nECG\nCXR","notes":"Burch-Wartofsky score >=45 = thyroid storm\nOrder of treatment matters: PTU first, then iodine 1h later\nIf iodine given before PTU, thyroid uses it to make more hormone\nCommon precipitants: infection, surgery, trauma, DKA, iodine contrast, medication noncompliance\nMortality 10-30% even with treatment","created":1772760266083,"builtIn":true},{"id":"dx33","name":"Adrenal Crisis","icd":"E27.2","catId":"c6","color":"#eab308","signs":"Hypotension/shock refractory to fluids and vasopressors\nSevere weakness/fatigue\nAbdominal pain/nausea/vomiting\nFever\nAltered mental status\nHyponatremia\nHyperkalemia\nHypoglycemia\nHyperpigmentation (chronic primary AI)","treatment":"1. IV hydrocortisone 100mg STAT (do not delay for diagnosis)\n2. Aggressive IV fluid resuscitation with NS\n3. Correct hypoglycemia with D50\n4. Treat precipitating illness\n5. Transition to oral steroids when stable\n6. Mineralocorticoid replacement not needed acutely (hydrocortisone has mineralocorticoid activity at high doses)","meds":"Hydrocortisone 100mg IV bolus then 50mg IV q8h\nNS 1-2L rapid bolus then continue resuscitation\nD50 if hypoglycemic\nFludrocortisone 0.1mg PO daily (when eating, for primary AI)","ddx":"Septic shock, MI, PE, Meningococcemia, Thyroid storm, Opioid overdose","labs":"Cortisol level (draw before giving steroids if possible, but do NOT delay treatment)\nACTH level (high in primary, low in secondary)\nBMP (hyponatremia, hyperkalemia)\nGlucose\nCBC\nTSH\nCosyntropin stimulation test (when stable)","notes":"Triggers: infection, surgery, trauma, abrupt steroid withdrawal\nPatients on chronic steroids need stress-dose steroids for illness/surgery\nStress dosing: Hydrocortisone 50mg IV q8h for moderate illness, 100mg q8h for severe\nWaterhouse-Friderichsen: bilateral adrenal hemorrhage from meningococcemia\nDo NOT delay treatment for lab confirmation","created":1772760265083,"builtIn":true},{"id":"dx34","name":"Acute Kidney Injury","icd":"N17.9","catId":"c7","color":"#3b82f6","signs":"Oliguria or anuria\nFluid overload (edema, pulmonary congestion)\nFatigue/malaise\nNausea/vomiting\nConfusion (uremia)\nPruritus\nAsterixis (severe)\nPericardial friction rub (uremia)\nMetallic taste","treatment":"1. Identify and treat cause (prerenal, intrinsic, postrenal)\n2. Prerenal: IV fluid resuscitation\n3. Postrenal: relieve obstruction (Foley, nephrostomy)\n4. Intrinsic: treat underlying (stop nephrotoxins, treat GN)\n5. Avoid nephrotoxins (NSAIDs, contrast, aminoglycosides)\n6. Adjust renally-dosed medications\n7. Dialysis indications: AEIOU","meds":"NS or LR for prerenal (fluid resuscitation)\nFurosemide 40-80mg IV (if fluid overloaded, NOT to treat AKI)\nCalcium gluconate 1g IV (if hyperkalemia with ECG changes)\nRegular insulin 10 units + D50 (shift K intracellularly)\nSodium bicarbonate 150mEq in D5W for acidosis\nKayexalate 15-30g PO (controversial)","ddx":"CKD, Prerenal azotemia, ATN, AIN, Glomerulonephritis, Obstructive uropathy, Hepatorenal syndrome, Rhabdomyolysis","labs":"BMP (creatinine trend, BUN, K, bicarb)\nUrinalysis with microscopy (casts: muddy brown = ATN, WBC = AIN, RBC = GN)\nFENa (<1% prerenal, >2% intrinsic) or FEUrea if on diuretics\nCBC\nRenal ultrasound (hydronephrosis, kidney size)\nUrine electrolytes\nCK (rhabdomyolysis)","notes":"KDIGO staging: Stage 1 (1.5-1.9x), Stage 2 (2-2.9x), Stage 3 (>=3x or Cr >=4 or dialysis)\nDialysis indications (AEIOU): Acidosis, Electrolytes (K), Ingestions, Overload, Uremia symptoms\nFENa = (UNa x PCr)/(PNa x UCr) x 100\nPrerenal: BUN:Cr >20, FENa <1%, bland sediment\nATN: muddy brown casts, FENa >2%\nContrast nephropathy prevention: IV hydration pre/post, hold metformin","created":1772760264083,"builtIn":true},{"id":"dx35","name":"Hyperkalemia","icd":"E87.5","catId":"c7","color":"#3b82f6","signs":"Often asymptomatic until severe\nMuscle weakness (ascending)\nParesthesias\nPalpitations\nBradycardia\nNausea\nParalysis (severe)\nCardiac arrest (severe)\nECG changes: peaked T waves, wide QRS, sine wave","treatment":"1. Stabilize myocardium: calcium gluconate (if ECG changes)\n2. Shift K intracellularly: insulin + glucose, albuterol, bicarb\n3. Remove K from body: diuretics, kayexalate/patiromer, dialysis\n4. Continuous cardiac monitoring\n5. Treat underlying cause\n6. Stop offending medications","meds":"Calcium gluconate 1-2g IV over 2-5min (cardioprotection, onset 1-3min)\nRegular insulin 10 units IV + D50 25g IV (shift, onset 15-30min)\nAlbuterol 10-20mg nebulized (shift)\nFurosemide 40-80mg IV (removal)\nSodium polystyrene (Kayexalate) 15-30g PO (removal, slow)\nPatiromer 8.4g PO (newer, better tolerated)\nSodium bicarbonate 50-100mEq IV (if acidotic)","ddx":"Pseudohyperkalemia (hemolyzed sample, tourniquet), AKI/CKD, Rhabdomyolysis, Adrenal insufficiency, Medications (ACEi, K-sparing diuretics, TMP-SMX), Tumor lysis, Acidosis","labs":"BMP (K level, renal function)\nECG (peaked T -> prolonged PR -> wide QRS -> sine wave -> VF)\nVBG/ABG (acidosis)\nRepeat K to confirm\nCBC\nCK (rhabdomyolysis)\nDigoxin level if applicable\nUrine K, TTKG","notes":"ECG changes roughly correlate: >5.5: peaked T; >6.5: loss of P wave, wide QRS; >7: sine wave, VF\nCalcium does NOT lower K - it stabilizes the myocardium\nAlways give D50 with insulin to prevent hypoglycemia\nCheck glucose q1h x4h after insulin\nDialysis is definitive treatment for severe/refractory\nACEi/ARB + K-sparing diuretic + TMP-SMX = triple whammy for hyperK","created":1772760263083,"builtIn":true},{"id":"dx36","name":"Hip Fracture","icd":"S72.009A","catId":"c8","color":"#ec4899","signs":"Hip pain after fall\nShortened and externally rotated leg\nInability to bear weight\nPain with axial loading\nPain with log roll\nEcchymosis (delayed)\nGroin pain","treatment":"1. Operative repair within 24-48h\n2. Femoral neck: hemiarthroplasty (elderly, displaced) or ORIF (young, non-displaced)\n3. Intertrochanteric: ORIF with sliding hip screw or IM nail\n4. Pain management (femoral nerve block)\n5. DVT prophylaxis\n6. Early mobilization\n7. Osteoporosis workup and treatment","meds":"Fascia iliaca block or femoral nerve block\nAcetaminophen 1g IV/PO q6h\nOxycodone 5-10mg PO q4h PRN\nEnoxaparin 40mg SC daily (DVT prophylaxis)\nCalcium + Vitamin D\nBisphosphonate (after fracture healed)","ddx":"Pelvic fracture, Pubic ramus fracture, Greater trochanteric bursitis, Pathologic fracture, Hip dislocation, Stress fracture","labs":"X-ray pelvis AP + lateral hip\nMRI if X-ray negative but high suspicion\nCBC, BMP, coags\nType and screen\nECG (preop)\nVitamin D level\nDEXA scan (osteoporosis)","notes":"Femoral neck fractures at risk for AVN (blood supply disruption)\nGarden classification for femoral neck displacement\nEvans classification for intertrochanteric\nMortality: 20-30% at 1 year in elderly\nDelaying surgery >48h increases complications and mortality\nOccult hip fracture: normal X-ray in 2-10% - get MRI","created":1772760262083,"builtIn":true},{"id":"dx37","name":"Compartment Syndrome","icd":"T79.A0","catId":"c8","color":"#ec4899","signs":"Pain out of proportion to injury\nPain with passive stretch (earliest reliable sign)\nParesthesias\nPressure/tenseness of compartment\nPallor (late)\nPulselessness (very late)\nParalysis (late - indicates irreversible damage)","treatment":"1. EMERGENT fasciotomy (definitive V\nFamotidine 20mg IV\nMethylprednisolone 125mg IV\nAlbuterol 2.5mg nebulized (bronchospasm)\nNS 1-2L rapid bolus","ddx":"Asthma exacerbation, Vasovagal syncope, Angioedema (ACEi), Carcinoid syndrome, Mastocytosis, Panic attack, Vocal cord dysfunction","labs":"Clinical diagnosis - do NOT delay treatment for labs\nTryptase (draw within 1-2h, peaks at 1h, repeat at 24h as baseline)\nCBC\nBMP\nABG if severe respiratory distress","notes":"Epinephrine is THE treatment - there is NO contraindication in anaphylaxis\nIM (vastus lateralis) not SC - faster absorption\nBiphasic reaction in up to 20% - occurs 1-72h after initial reaction (usually 8-10h)\nCommon triggers: foods (nuts, shellfish), medications (penicillin, NSAIDs), insect stings, latex\nDo NOT rely on antihistamines/steroids alone - they do not treat the life-threatening components","created":1772760260083,"builtIn":true},{"id":"dx39","name":"Acetaminophen Overdose","icd":"T39.1X1A","catId":"c9","color":"#f43f5e","signs":"Phase 1 (0-24h): Nausea, vomiting, anorexia, malaise\nPhase 2 (24-72h): RUQ pain, elevated LFTs, improving nausea\nPhase 3 (72-96h): Hepatic failure, jaundice, coagulopathy, encephalopathy, renal failure\nPhase 4 (4-14d): Recovery or death","treatment":"1. Activated charcoal if <4h since ingestion\n2. N-acetylcysteine (NAC) - most effective within 8h but give if any concern\n3. Use Rumack-Matthew nomogram for acute single ingestion\n4. Check APAP level at 4h post-ingestion\n5. Liver transplant evaluation if fulminant failure\n6. King College Criteria for transplant listing","meds":"Activated charcoal 1g/kg PO (if <4h)\nNAC IV protocol: 150mg/kg over 1h, then 50mg/kg over 4h, then 100mg/kg over 16h\nNAC PO: 140mg/kg loading, then 70mg/kg q4h x17 doses\nOndansetron 4mg IV PRN (NAC causes nausea)","ddx":"Viral hepatitis, Alcoholic hepatitis, Mushroom poisoning (Amanita), Drug-induced liver injury, Wilson disease, Budd-Chiari","labs":"APAP level at 4h post-ingestion (plot on Rumack-Matthew)\nAST/ALT (may be normal initially)\nPT/INR (best marker of synthetic function)\nBMP (creatinine, bicarb)\nLipase\nLactate\nPhosphate (low = poor prognosis)\nBlood gas (pH <7.3 = poor prognosis)","notes":"Toxic dose: >150mg/kg or >7.5g in adults\nNAC is nearly 100% effective if given within 8h\nRumack-Matthew nomogram: plot 4h level vs time - treat if above treatment line\nKings College (non-APAP ALF): INR >6.5, or 3 of: age <10 or >40, non-A non-B, jaundice >7d before encephalopathy, INR >3.5, bilirubin >17.5\nChronic APAP: nomogram may not apply, lower threshold to treat","created":1772760259083,"builtIn":true},{"id":"dx40","name":"Alcohol Withdrawal","icd":"F10.239","catId":"c9","color":"#f43f5e","signs":"Tremor (6-24h)\nAnxiety/agitation\nInsomnia\nNausea/vomiting\nDiaphoresis\nTachycardia/HTN\nSeizures (12-48h)\nHallucinations (12-48h, often visual)\nDelirium tremens (48-96h): confusion, agitation, autonomic instability, fever","treatment":"1. Benzodiazepines (symptom-triggered preferred over fixed-dose)\n2. CIWA-Ar protocol for monitoring\n3. Thiamine 500mg IV x3 days BEFORE glucose\n4. Folate 1mg IV/PO daily\n5. Fluid/electrolyte replacement\n6. ICU for DTs or severe withdrawal\n7. Phenobarbital or propofol for benzo-resistant cases","meds":"Diazepam 10-20mg IV q5-10min (symptom-triggered)\nOR Lorazepam 2-4mg IV q15-20min (hepatic impairment)\nChlordiazepoxide 50-100mg PO q6h (mild, taper)\nPhenobarbital 260mg IV (benzo-resistant)\nThiamine 500mg IV TID x3d then 100mg PO daily\nFolate 1mg daily\nMgSO4 2g IV if hypomagnesemic","ddx":"Thyroid storm, Sympathomimetic toxicity, Anticholinergic toxicity, Serotonin syndrome, NMS, Sepsis, Meningitis, Hepatic encephalopathy","labs":"BAL\nCBC, BMP (Mg, Phos, Ca)\nLFTs\nLipase\nAmmonia\nCoags\nBlood gas\nUrinalysis\nCXR\nCT head if altered or seizures or trauma","notes":"DTs mortality 5-15% untreated, <1% with treatment\nCIWA-Ar score: >=10 treat, >=20 severe\nSeizures: typically generalized tonic-clonic, brief, self-limited\nKindling: repeated withdrawal episodes become progressively more severe\nAlways give thiamine BEFORE glucose (prevent Wernicke)\nWernicke triad: confusion, ataxia, ophthalmoplegia (all 3 present in only 10%)","created":1772760258083,"builtIn":true},{"id":"dx41","name":"Disseminated Intravascular Coagulation","icd":"D65","catId":"c10","color":"#ec4899","signs":"Simultaneous bleeding AND clotting\nPetechiae/purpura\nOozing from IV sites, wounds\nMucosal bleeding\nHematuria\nGI bleeding\nThromboembolic events\nOrgan dysfunction\nAcral ischemia/gangrene","treatment":"1. Treat underlying cause (this is key)\n2. Transfuse based on clinical bleeding, not just lab values\n3. Platelets if <10k (or <50k with active bleeding)\n4. FFP for prolonged PT/INR with bleeding\n5. Cryoprecipitate if fibrinogen <150\n6. Heparin only in selected cases (predominant thrombosis)\n7. Do NOT give antifibrinolytics in acute DIC","meds":"Platelets: 1 unit per 10kg\nFFP: 15mL/kg\nCryoprecipitate: 10 units (for fibrinogen)\nPRBCs as needed\nHeparin (only if thrombosis-predominant): 500-750 units/h without bolus","ddx":"TTP, HUS, HELLP syndrome, Liver failure (coagulopathy), Vitamin K deficiency, Primary fibrinolysis, ITP","labs":"CBC (thrombocytopenia, MAHA on smear)\nPT/INR (prolonged)\nPTT (prolonged)\nFibrinogen (low, <150)\nD-dimer (markedly elevated)\nPeripheral smear (schistocytes)\nLDH (elevated)\nHaptoglobin (decreased)\nISSC DIC score","notes":"DIC is always secondary to an underlying condition\nCommon triggers: sepsis, trauma, obstetric emergencies, malignancy (esp APL), snake envenomation\nAcute DIC: bleeding predominant; Chronic DIC: thrombosis predominant\nAPL (Acute Promyelocytic Leukemia): DIC is hallmark - treat with ATRA\nISSC score >=5 = overt DIC","created":1772760257083,"builtIn":true},{"id":"dx42","name":"Sickle Cell Crisis","icd":"D57.00","catId":"c10","color":"#ec4899","signs":"Severe pain (bones, chest, abdomen)\nFever\nSwelling of hands/feet (dactylitis in children)\nAcute chest syndrome: fever, chest pain, infiltrate, hypoxia\nStroke symptoms\nPriapism\nSplenic sequestration (LUQ pain, splenomegaly, acute anemia)\nJaundice","treatment":"1. Aggressive pain management (do not undertreat)\n2. IV fluids (avoid overhydration)\n3. Oxygen if hypoxic\n4. Acute chest syndrome: antibiotics + exchange transfusion\n5. Simple transfusion for severe anemia (Hgb <5 or symptomatic)\n6. Exchange transfusion for stroke, severe ACS\n7. Incentive spirometry (prevent ACS)\n8. Hydroxyurea for prevention","meds":"Morphine 0.1-0.15mg/kg IV q2-3h or PCA\nKetorolac 15-30mg IV q6h\nAcetaminophen 1g PO q6h\nIV NS maintenance (avoid boluses unless dehydrated)\nCeftriaxone 2g IV + Azithromycin 500mg (ACS)\nHydroxyurea 15-35mg/kg/day (chronic, prevention)\nFolic acid 1mg daily","ddx":"Osteomyelitis, Avascular necrosis, PE, Pneumonia, Cholecystitis, Aplastic crisis (parvovirus B19), Splenic sequestration","labs":"CBC with retic count\nReticulocyte count (high in crisis, low in aplastic crisis)\nPeripheral smear (sickle cells)\nType and screen\nBMP, LFTs, LDH\nBilirubin (unconjugated elevation)\nHgb electrophoresis (if not previously done)\nCXR (ACS)\nBlood cultures if febrile\nTranscranial Doppler (stroke screening in children)","notes":"ACS: leading cause of death in SCD adults - new infiltrate + fever/resp symptoms\nStroke: 11% of SCD patients by age 20, exchange transfusion emergently\nParvovirus B19: causes aplastic crisis (reticulocyte count drops)\nSplenic sequestration: acute drop in Hgb >=2 with acute splenic enlargement\nAvoid: cold exposure, dehydration, high altitude, overexertion\nScreen with transcranial Doppler annually ages 2-16","created":1772760256083,"builtIn":true},{"id":"dx43","name":"Cardiac Tamponade","icd":"I31.4","catId":"c1","color":"#f43f5e","signs":"Beck triad: hypotension, JVD, muffled heart sounds\nTachycardia\nPulsus paradoxus >10mmHg\nDyspnea\nElectrical alternans on ECG\nNarrow pulse pressure\nShock","treatment":"1. Emergent pericardiocentesis\n2. IV fluid bolus to increase preload\n3. Avoid diuretics, vasodilators, positive pressure ventilation\n4. Surgical pericardial window for recurrent\n5. Treat underlying cause","meds":"NS 500mL-1L rapid bolus\nPericardiocentesis: subxiphoid approach, US-guided\nDobutamine if needed post-drainage\nTreat cause-specific (antibiotics, chemo, etc)","ddx":"Tension pneumothorax, Massive PE, Cardiogenic shock, Constrictive pericarditis, RV infarct","labs":"Bedside echo (pericardial effusion, diastolic RA/RV collapse, IVC plethora)\nECG (low voltage, electrical alternans, sinus tach)\nCXR (water-bottle heart)\nPericardial fluid analysis: cell count, protein, LDH, glucose, cytology, culture, ADA","notes":"Even small rapid effusions can cause tamponade\nSlow effusions (chronic) can accumulate 1-2L before tamponade\nPulsus paradoxus: >10mmHg drop in SBP with inspiration\nEqualization of diastolic pressures on right heart cath\nCauses: malignancy, uremia, infection, post-MI (Dressler), trauma, aortic dissection","created":1772760255083,"builtIn":true},{"id":"dx44","name":"Acute Coronary Syndrome - NSTEMI","icd":"I21.4","catId":"c1","color":"#f43f5e","signs":"Chest pain/pressure (may be atypical)\nDyspnea\nDiaphoresis\nNausea\nPain at rest or with minimal exertion\nST depression or T-wave inversion on ECG\nElevated troponin","treatment":"1. Dual antiplatelet therapy (aspirin + P2Y12 inhibitor)\n2. Anticoagulation (heparin)\n3. Risk stratify with TIMI or GRACE score\n4. Early invasive strategy (cath within 24h) for high-risk\n5. Beta-blocker if no contraindications\n6. High-intensity statin\n7. Nitrates for ongoing ischemia","meds":"Aspirin 325mg then 81mg daily\nTicagrelor 180mg then 90mg BID (preferred) or Clopidogrel 600mg then 75mg daily\nHeparin 60u/kg bolus then 12u/kg/h (PTT 50-70)\nMetoprolol 25mg PO\nAtorvastatin 80mg PO\nNitroglycerin 0.4mg SL q5min x3 or IV infusion","ddx":"STEMI, Unstable angina, PE, Aortic dissection, Myocarditis, Takotsubo cardiomyopathy,
