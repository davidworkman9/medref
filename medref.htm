<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MedRef">
<meta name="theme-color" content="#0f172a">
<title>MedRef</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #273449;
    --border: #334155;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent1: #f97316;
    --accent2: #06b6d4;
    --accent3: #a855f7;
    --accent4: #22c55e;
    --accent5: #f43f5e;
    --accent6: #eab308;
    --radius: 16px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; overflow-x: hidden; }
  #app { display: flex; flex-direction: column; height: 100dvh; }
  #header { background: var(--bg); padding: calc(var(--safe-top) + 12px) 16px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; position: sticky; top: 0; z-index: 50; }
  #header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  #logo { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: -1px; }
  #logo span:nth-child(1) { color: var(--accent2); }
  #logo span:nth-child(2) { color: var(--text); }
  #logo span:nth-child(3) { color: var(--accent1); }
  #add-btn { background: var(--accent1); color: #fff; border: none; border-radius: 50px; padding: 8px 18px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  #add-btn:active { opacity: 0.8; transform: scale(0.97); }
  #search-wrap { position: relative; }
  #search { width: 100%; background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 11px 14px 11px 40px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; outline: none; transition: border-color 0.2s; }
  #search:focus { border-color: var(--accent2); }
  #search::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  #ai-badge { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 50px; pointer-events: none; transition: all 0.3s; }
  #ai-badge.loading { background: var(--accent6); color: var(--bg); }
  #ai-badge.ready { background: var(--accent4); color: var(--bg); }
  #ai-badge.off { display: none; }
  #tabs { display: flex; padding: 10px 16px 0; gap: 8px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; background: var(--bg); border-bottom: 1px solid var(--border); }
  #tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 8px 16px; border-radius: 10px 10px 0 0; border: none; background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; border-bottom: 3px solid transparent; padding-bottom: 10px; }
  .tab.active { color: var(--text); border-bottom-color: var(--accent2); }
  .tab:active { opacity: 0.7; }
  #main { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: calc(var(--safe-bottom) + 80px); }
  #category-bar { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; margin-bottom: 16px; padding-bottom: 4px; }
  #category-bar::-webkit-scrollbar { display: none; }
  .cat-pill { padding: 6px 14px; border-radius: 50px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .cat-pill.active, .cat-pill:active { color: #fff; }
  .section-letter { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800; color: var(--accent2); letter-spacing: 2px; text-transform: uppercase; padding: 8px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 10px; margin-top: 6px; }
  .dx-card { background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border); margin-bottom: 10px; cursor: pointer; transition: transform 0.15s, border-color 0.15s; overflow: hidden; }
  .dx-card:active { transform: scale(0.98); }
  .dx-card-header { display: flex; align-items: center; gap: 12px; padding: 14px; }
  .dx-color-bar { width: 4px; height: 44px; border-radius: 4px; flex-shrink: 0; }
  .dx-card-info { flex: 1; min-width: 0; }
  .dx-name { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dx-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .dx-icd { font-size: 11px; font-weight: 600; color: var(--muted); background: var(--surface2); padding: 2px 8px; border-radius: 50px; font-family: 'DM Sans', monospace; }
  .dx-cat-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 50px; color: #fff; }
  .dx-card-chevron { color: var(--muted); font-size: 18px; }
  .dx-score { font-size: 10px; color: var(--accent4); font-weight: 600; margin-left: auto; padding: 2px 6px; background: rgba(34,197,94,0.15); border-radius: 50px; }
  #detail-view { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; }
  #detail-view.open { display: flex; }
  #detail-header { padding: calc(var(--safe-top) + 12px) 16px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #detail-back { background: none; border: none; color: var(--accent2); font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
  #detail-title-bar { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  #detail-name { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; line-height: 1.2; flex: 1; }
  #detail-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .icon-btn { background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); font-size: 17px; }
  .icon-btn:active { opacity: 0.7; }
  .icon-btn.delete { color: var(--accent5); }
  #detail-body { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: calc(var(--safe-bottom) + 20px); }
  .detail-meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .section-card { background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border); margin-bottom: 14px; overflow: hidden; }
  .section-card-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .section-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .section-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
  .section-content { padding: 14px; color: var(--text); font-size: 15px; line-height: 1.7; white-space: pre-wrap; }
  .section-content ul { list-style: none; }
  .section-content ul li { padding: 4px 0; display: flex; align-items: flex-start; gap: 8px; }
  .section-content ul li::before { content: '\25B8'; color: var(--accent2); flex-shrink: 0; margin-top: 1px; }
  .tag-list { display: flex; flex-wrap: wrap; gap: 8px; padding: 14px; }
  .tag { padding: 6px 12px; border-radius: 50px; font-size: 13px; font-weight: 600; background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
  #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; display: none; align-items: flex-end; }
  #modal-overlay.open { display: flex; }
  #modal { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; max-height: 92dvh; display: flex; flex-direction: column; padding-bottom: var(--safe-bottom); animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  #modal-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #modal-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
  #modal-close { background: var(--surface2); border: none; border-radius: 50%; width: 32px; height: 32px; color: var(--muted); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  #modal-body { flex: 1; overflow-y: auto; padding: 20px; }
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .form-input, .form-textarea, .form-select { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; outline: none; transition: border-color 0.2s; appearance: none; -webkit-appearance: none; }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent2); }
  .form-textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
  .form-hint { font-size: 12px; color: var(--muted); margin-top: 5px; }
  .color-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
  .color-swatch { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: border-color 0.15s, transform 0.15s; }
  .color-swatch.selected { border-color: #fff; transform: scale(1.1); }
  #modal-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; flex-shrink: 0; }
  .btn-primary { flex: 1; background: var(--accent1); color: #fff; border: none; border-radius: 12px; padding: 14px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 16px; cursor: pointer; transition: opacity 0.2s; }
  .btn-primary:active { opacity: 0.8; }
  .btn-cancel { background: var(--surface2); color: var(--muted); border: none; border-radius: 12px; padding: 14px 20px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 16px; cursor: pointer; }
  #cat-manager { position: fixed; inset: 0; background: var(--bg); z-index: 150; display: none; flex-direction: column; }
  #cat-manager.open { display: flex; }
  #cat-manager-header { padding: calc(var(--safe-top) + 12px) 16px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  #cat-manager-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
  #cat-manager-body { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: calc(var(--safe-bottom) + 20px); }
  .cat-item { display: flex; align-items: center; gap: 12px; background: var(--surface); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; border: 1.5px solid var(--border); }
  .cat-item-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .cat-item-name { flex: 1; font-weight: 600; font-size: 16px; }
  .cat-delete-btn { background: none; border: none; color: var(--accent5); font-size: 20px; cursor: pointer; padding: 4px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .empty-state-sub { font-size: 15px; line-height: 1.6; }
  #install-banner { position: fixed; bottom: calc(var(--safe-bottom) + 16px); left: 16px; right: 16px; background: var(--accent2); color: var(--bg); border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 10px; z-index: 300; box-shadow: 0 8px 32px rgba(6,182,212,0.4); animation: fadeInUp 0.4s ease; }
  @keyframes fadeInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  #install-banner.hidden { display: none; }
  #install-banner-text { flex: 1; font-size: 13px; font-weight: 600; line-height: 1.4; }
  #install-dismiss { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--bg); padding: 4px; }
  .count-badge { background: var(--surface2); color: var(--muted); font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 50px; margin-left: 4px; }
</style>
</head>
<body>
<div id="install-banner">
  <span style="font-size:22px">📲</span>
  <div id="install-banner-text">Tap <strong>Share → Add to Home Screen</strong> to install MedRef as an app!</div>
  <button id="install-dismiss" onclick="dismissBanner()">✕</button>
</div>
<div id="app">
  <div id="header">
    <div id="header-top">
      <div id="logo"><span>Med</span><span>Ref</span><span>+</span></div>
      <button id="add-btn" onclick="openModal()">＋ Add Dx</button>
    </div>
    <div id="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="search" type="search" placeholder="Search diagnoses..." autocomplete="off" autocorrect="off" spellcheck="false">
      <span id="ai-badge" class="off"></span>
    </div>
  </div>
  <div id="tabs">
    <button class="tab active" data-tab="browse" onclick="switchTab('browse')">Browse A–Z</button>
    <button class="tab" data-tab="category" onclick="switchTab('category')">By Category</button>
    <button class="tab" data-tab="recent" onclick="switchTab('recent')">Recent</button>
  </div>
  <div id="main">
    <div id="category-bar"></div>
    <div id="dx-list"></div>
  </div>
</div>
<div id="detail-view">
  <div id="detail-header">
    <button id="detail-back" onclick="closeDetail()">← Back</button>
    <div id="detail-title-bar">
      <div id="detail-name"></div>
      <div id="detail-actions">
        <div class="icon-btn" onclick="editCurrentDx()" title="Edit">✏️</div>
        <div class="icon-btn delete" onclick="deleteCurrentDx()" title="Delete">🗑</div>
      </div>
    </div>
  </div>
  <div id="detail-body"></div>
</div>
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-header">
      <div id="modal-title">New Diagnosis</div>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body">
      <div class="form-group"><label class="form-label">Diagnosis Name *</label><input id="f-name" class="form-input" type="text" placeholder="e.g. Acute Appendicitis"></div>
      <div class="form-group"><label class="form-label">ICD-10 Code</label><input id="f-icd" class="form-input" type="text" placeholder="e.g. K35.89" style="font-family:monospace;font-size:15px;"></div>
      <div class="form-group"><label class="form-label">Category</label><select id="f-cat" class="form-select"></select></div>
      <div class="form-group"><label class="form-label">Color Label</label><div class="color-row" id="color-row"></div></div>
      <div class="form-group"><label class="form-label">Signs & Symptoms</label><textarea id="f-signs" class="form-textarea" placeholder="List signs and symptoms..."></textarea></div>
      <div class="form-group"><label class="form-label">Treatment</label><textarea id="f-treatment" class="form-textarea" placeholder="Treatment protocols..."></textarea></div>
      <div class="form-group"><label class="form-label">Medications / Dosing</label><textarea id="f-meds" class="form-textarea" placeholder="Drug names, doses..."></textarea></div>
      <div class="form-group"><label class="form-label">Differential Diagnoses</label><input id="f-ddx" class="form-input" type="text" placeholder="Comma separated..."></div>
      <div class="form-group"><label class="form-label">Lab / Imaging Findings</label><textarea id="f-labs" class="form-textarea" placeholder="Key labs, imaging..."></textarea></div>
      <div class="form-group"><label class="form-label">Clinical Pearls / Notes</label><textarea id="f-notes" class="form-textarea" placeholder="Teaching points..."></textarea></div>
    </div>
    <div id="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveDx()">Save Diagnosis</button>
    </div>
  </div>
</div>
<div id="cat-manager">
  <div id="cat-manager-header">
    <div id="cat-manager-title">Manage Categories</div>
    <button class="icon-btn" onclick="closeCatManager()">✕</button>
  </div>
  <div id="cat-manager-body">
    <div class="form-group" style="display:flex;gap:10px;">
      <input id="new-cat-name" class="form-input" type="text" placeholder="New category name..." style="flex:1">
      <div id="cat-color-pick" style="display:flex;gap:6px;align-items:center;"></div>
    </div>
    <button class="btn-primary" onclick="addCategory()" style="width:100%;margin-bottom:20px;">Add Category</button>
    <div id="cat-list"></div>
  </div>
</div>
<script>
// will be continued in next part
</script>
</body>
</html>
